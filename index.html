<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校車路線與時刻查詢系統</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f8f9fa;
      color: #333;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }
    h2 {
      margin-top: 0;
      color: #1e3a8a;
      border-bottom: 2px solid #e5e7eb;
      padding-bottom: 10px;
    }
    .select-group {
      margin-bottom: 20px;
    }
    label {
      font-weight: bold;
      display: block;
      margin-bottom: 8px;
    }
    select {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background-color: #fff;
    }
    #map {
      height: 450px;
      width: 100%;
      border-radius: 6px;
      border: 1px solid #e5e7eb;
    }
    #pano {
      height: 300px;
      width: 100%;
      margin-top: 20px;
      border-radius: 6px;
      border: 1px solid #e5e7eb;
      display: none;
    }
    .hint {
      font-size: 14px;
      color: #6b7280;
      margin-top: 5px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>🚌 校車路線時刻查詢</h2>
    
    <div class="select-group">
      <label for="routeSelect">請選擇校車路線：</label>
      <select id="routeSelect" onchange="loadSelectedRoute()">
        <option value="">-- 請選擇 --</option>
      </select>
      <p class="hint">💡 提示：點擊地圖上的站點圖標，下方可查看 Google 實景街景影像。</p>
    </div>
    
    <!-- Google 地圖顯示區域 -->
    <div id="map"></div>
    
    <!-- Google 街景顯示區域 -->
    <div id="pano"></div>
  </div>


  
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA6X_jnYl1SBCbEPMiiTEHOCAudU3J451M&callback=initMap"
    async defer>
    let map;
    let globalData = [];
    let markers = [];
    let routeLine = null;

    // 1. 初始化 Google 地圖
    function initMap() {
      // 預設中心點設定在台灣中部
      map = new google.maps.Map(document.getElementById('map'), {
        center: { lat: 23.456104719767684, lng: 120.46234747761909 },
        zoom: 12,
        mapTypeControl: false
      });
      
      // 地圖載入完成後，開始拉取 JSON 資料
      fetchRoutes();
    }

    // 2. 從 GitHub 讀取 Excel 轉出的平鋪型 JSON 檔案
    async function fetchRoutes() {
      // ⚠️ 請替換為您在 GitHub 儲存庫中 bus_data.json 的 Raw (原始資料) 連結
      const GITHUB_JSON_URL = 'bus_data.json';
      
      try {
        const response = await fetch(GITHUB_JSON_URL);
        if (!response.ok) throw new Error('網路回應不成功');
        
        globalData = await response.json();
        
        // 自動過濾 Excel 多行資料中重複的 route_id，提取出唯一的路線清單
        const uniqueRoutes = [];
        const seen = new Set();
        
        globalData.forEach(row => {
          if (row.route_id && !seen.has(row.route_id)) {
            seen.add(row.route_id);
            uniqueRoutes.push({ id: row.route_id, name: row.route_name });
          }
        });

        // 將路線選單渲染至網頁下拉選單
        const select = document.getElementById('routeSelect');
        uniqueRoutes.forEach(route => {
          const opt = document.createElement('option');
          opt.value = route.id;
          opt.innerText = route.name;
          select.appendChild(opt);
        });
        
      } catch (error) {
        console.error('讀取校車資料失敗:', error);
        alert('無法載入校車路線資料，請檢查 GitHub 網址設定或 API 狀態。');
      }
    }

    // 3. 當使用者切換路線時，篩選平鋪資料並渲染地圖
    function loadSelectedRoute() {
      const selectedRouteId = document.getElementById('routeSelect').value;
      
      // 清除舊的地圖標記、路線折線與街景
      markers.forEach(m => m.setMap(null));
      markers = [];
      if (routeLine) {
        routeLine.setMap(null);
        routeLine = null;
      }
      document.getElementById('pano').style.display = 'none';

      // 若未選擇任何路線則返回
      if (!selectedRouteId) return;

      // 自全域資料中過濾出屬於該路線且啟用的站點，並依 sequence 數字排序
      const routeStops = globalData
        .filter(row => row.route_id === selectedRouteId && (row.is_active === true || row.is_active === "TRUE"))
        .sort((a, b) => parseInt(a.sequence) - parseInt(b.sequence));

      if (routeStops.length === 0) {
        alert('該路線目前無有效的站點資料。');
        return;
      }

      const pathCoordinates = [];
      const bounds = new google.maps.LatLngBounds();

      // 遍歷所有站點並在畫面上打點
      routeStops.forEach(stop => {
        const position = { lat: parseFloat(stop.lat), lng: parseFloat(stop.lng) };
        pathCoordinates.push(position);
        bounds.extend(position);

        // A. 建立地圖圖標 (Marker)
        const marker = new google.maps.Marker({
          position: position,
          map: map,
          label: {
            text: stop.sequence.toString(),
            color: "#ffffff",
            fontWeight: "bold"
          },
          title: `${stop.stop_name} (${stop.arrival_time})`
        });
        markers.push(marker);

        // B. 建立站點資訊視窗 (InfoWindow)
        const infoWindow = new google.maps.InfoWindow({
          content: `<div style="padding:5px;"><strong>${stop.stop_name}</strong><br>預估到站時間：${stop.arrival_time}</div>`
        });

        // 游標懸停在圖標上時顯示時間小視窗
        marker.addListener('mouseover', () => infoWindow.open(map, marker));
        marker.addListener('mouseout', () => infoWindow.close());

        // C. 點擊圖標時觸發 Google 街景 (StreetView)
        marker.addListener('click', () => {
          const panoEl = document.getElementById('pano');
          panoEl.style.display = 'block';
          
          // 在指定區塊渲染該站點經緯度的實景
          new google.maps.StreetViewPanorama(panoEl, {
            position: position,
            pov: { heading: 165, pitch: 0 },
            zoom: 1
          });
          
          // 網頁自動平滑滾動到街景區塊
          panoEl.scrollIntoView({ behavior: 'smooth' });
        });
      });

      // 4. 繪製校車行駛軌跡的紅色折線 (Polyline)
      routeLine = new google.maps.Polyline({
        path: pathCoordinates,
        geodesic: true,
        strokeColor: '#ef4444', // 紅色線段
        strokeOpacity: 0.8,
        strokeWeight: 4
      });
      routeLine.setMap(map);

      // 5. 根據所有站點的範圍自動縮放、調整地圖視野
      map.fitBounds(bounds);
    }
  </script>
</body>
</html>
