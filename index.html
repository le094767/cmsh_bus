<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校車路線與時刻查詢系統</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f8f9fa;
      color: #333;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }
    h2 {
      margin-top: 0;
      color: #1e3a8a;
      border-bottom: 2px solid #e5e7eb;
      padding-bottom: 10px;
    }
    .select-group {
      margin-bottom: 20px;
      background: #f0f4f8;
      padding: 15px;
      border-radius: 6px;
    }
    label {
      font-weight: bold;
      display: block;
      margin-bottom: 8px;
    }
    select {
      width: 100%;
      max-width: 400px;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background-color: #fff;
    }
    
    /* 左右兩欄主排版 */
    .main-content {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }
    .map-container {
      flex: 7;
      min-width: 0;
    }
    .sidebar {
      flex: 3;
      background-color: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 15px;
      max-height: 450px;
      overflow-y: auto;
    }
    
    #map {
      height: 450px;
      width: 100%;
      border-radius: 6px;
      border: 1px solid #e5e7eb;
      background-color: #eaeaea;
    }
    #pano {
      height: 300px;
      width: 100%;
      border-radius: 6px;
      border: 1px solid #e5e7eb;
      display: none;
      margin-top: 20px;
    }
    .hint {
      font-size: 14px;
      color: #6b7280;
      margin-top: 5px;
    }

    /* 側邊欄時間軸樣式 */
    .sidebar-title {
      font-size: 18px;
      font-weight: bold;
      color: #1e3a8a;
      margin-top: 0;
      margin-bottom: 15px;
      border-bottom: 1px solid #d1d5db;
      padding-bottom: 8px;
    }
    .stop-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .stop-item {
      display: flex;
      align-items: flex-start;
      margin-bottom: 15px;
      cursor: pointer;
      padding: 8px;
      border-radius: 4px;
      transition: background-color 0.2s;
    }
    .stop-item:hover {
      background-color: #e5e7eb;
    }
    .stop-badge {
      background-color: #1e3a8a;
      color: white;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      margin-right: 12px;
      flex-shrink: 0;
    }
    .stop-info {
      display: flex;
      flex-direction: column;
    }
    .stop-name {
      font-weight: bold;
      font-size: 15px;
      color: #1f2937;
    }
    .stop-time {
      font-size: 13px;
      color: #2563eb;
      margin-top: 2px;
      font-weight: 500;
    }
    .empty-sidebar-hint {
      color: #9ca3af;
      text-align: center;
      padding: 40px 0;
      font-size: 14px;
    }

    /* 💡 最新進階標記專用的 CSS 圓形數字圖標 */
    .custom-marker-pin {
      background-color: #e11d48; /* 漂亮的櫻桃紅色標記 */
      color: white;
      font-weight: bold;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
      border: 2px solid #fff;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>🚌 校車路線時刻查詢</h2>
    
    <div class="select-group">
      <label for="routeSelect">請選擇校車路線：</label>
      <select id="routeSelect" onchange="loadSelectedRoute()">
        <option value="">-- 讀取路線中 --</option>
      </select>
      <p class="hint">💡 提示：點擊地圖標記或右側站點名稱，下方可查看 Google 實景街景影像。</p>
    </div>
    
    <div class="main-content">
      <div class="map-container">
        <div id="map"></div>
      </div>
      
      <div class="sidebar">
        <div class="sidebar-title">⏱️ 站點與發車時刻</div>
        <div id="sidebarContent">
          <div class="empty-sidebar-hint">請先選擇上方校車路線</div>
        </div>
      </div>
    </div>
    
    <div id="pano"></div>
  </div>
<script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA6X_jnYl1SBCbEPMiiTEHOCAudU3J451M&loading=async&callback=initMap"> </script>

  <script>
    let map;
    let globalData = [];
    let markers = [];
    let routeLine = null;

    // 1. 初始化 Google 地圖（已升級最新規範）
    function initMap() {
      map = new google.maps.Map(document.getElementById('map'), {
        center: { lat: 23.456, lng: 120.462 }, 
        zoom: 12,
        mapTypeControl: false,
        // 💡 升級重點：必須要隨便填入一個字串作為 mapId 才能啟用進階標記元件
        mapId: "SCHOOL_BUS_MAP_ID" 
      });
      autoFetchJson();
    }

    // 2. 自動讀取 JSON 檔案
    async function autoFetchJson() {
      const JSON_URL = 'https://raw.githubusercontent.com/le094767/cmsh_bus/refs/heads/main/bus_data.json';
      try {
        const response = await fetch(JSON_URL);
        if (!response.ok) throw new Error('檔案讀取失敗');
        const data = await response.json();
        processRouteData(data);
      } catch (error) {
        console.error('讀取 JSON 失敗：', error);
        document.getElementById('routeSelect').innerHTML = '<option value="">-- 無法載入路線資料 --</option>';
      }
    }

    // 3. 解析 JSON 並填入選單
    function processRouteData(data) {
      globalData = data;
      const uniqueRoutes = [];
      const seen = new Set();
      
      globalData.forEach(row => {
        if (row.route_id && !seen.has(row.route_id)) {
          seen.add(row.route_id);
          uniqueRoutes.push({ id: row.route_id, name: row.route_name });
        }
      });

      const select = document.getElementById('routeSelect');
      if (uniqueRoutes.length === 0) {
        select.innerHTML = '<option value="">-- 無有效路線資料 --</option>';
        return;
      }

      select.innerHTML = '<option value="">-- 請選擇路線 --</option>';
      uniqueRoutes.forEach(route => {
        const opt = document.createElement('option');
        opt.value = route.id;
        opt.innerText = route.name;
        select.appendChild(opt);
      });
    }

    // 4. 直線連線備用方案
    function drawBackupStraightLine(coords) {
      if (routeLine) routeLine.setMap(null); 
      
      routeLine = new google.maps.Polyline({
        path: coords,
        geodesic: true,
        strokeColor: '#2563eb', 
        strokeOpacity: 0.8,
        strokeWeight: 5
      });
      routeLine.setMap(map);
      console.log("【防護機制】已使用直線備用方案連接站點。");
    }

    // 5. 切換路線的核心主要邏輯
    function loadSelectedRoute() {
      const selectedRouteId = document.getElementById('routeSelect').value;
      const sidebarContent = document.getElementById('sidebarContent');
      
      // 清除舊的進階標記
      markers.forEach(m => m.map = null); // 💡 升級重點：進階標記的清除方式是直接將其屬性 map 設為 null
      markers = [];
      
      if (routeLine) {
        routeLine.setMap(null);
        routeLine = null;
      }
      document.getElementById('pano').style.display = 'none';

      if (!selectedRouteId) {
        sidebarContent.innerHTML = '<div class="empty-sidebar-hint">請先選擇上方校車路線</div>';
        return;
      }

      // 依照順序嚴格排序站點
      const routeStops = globalData
        .filter(row => row.route_id === selectedRouteId && (row.is_active === true || row.is_active === "TRUE"))
        .sort((a, b) => parseInt(a.sequence) - parseInt(b.sequence));

      if (routeStops.length === 0) {
        sidebarContent.innerHTML = '<div class="empty-sidebar-hint" style="color:#ef4444;">該路線無有效資料</div>';
        return;
      }

      const ul = document.createElement('ul');
      ul.className = 'stop-list';

      const pathCoordinates = [];
      const bounds = new google.maps.LatLngBounds();

      // 產生進階 Marker 標記
      routeStops.forEach((stop) => {
        const position = { lat: parseFloat(stop.lat), lng: parseFloat(stop.lng) };
        pathCoordinates.push(position);
        bounds.extend(position);

        // 💡 升級重點：進階標記允許我們直接用標準 HTML 與 CSS 來自訂超級精美的數字圖標外觀
        const markerTag = document.createElement("div");
        markerTag.className = "custom-marker-pin";
        markerTag.innerText = stop.sequence.toString();

        // 💡 升級重點：全面改用全新的 google.maps.marker.AdvancedMarkerElement 元件
        const advancedMarker = new google.maps.marker.AdvancedMarkerElement({
          map: map,
          position: position,
          content: markerTag, // 置入我們用 CSS 畫好的漂亮數字圈圈
          title: `${stop.stop_name} (${stop.arrival_time})`
        });
        markers.push(advancedMarker);

        const infoWindow = new google.maps.InfoWindow({
          content: `<div style="padding:5px;"><strong>${stop.stop_name}</strong><br>預估到站時間：${stop.arrival_time}</div>`
        });
        
        // 進階標記綁定監聽事件的方法與傳統完全相同
        advancedMarker.addListener('click', () => {
          const panoEl = document.getElementById('pano');
          panoEl.style.display = 'block';
          new google.maps.StreetViewPanorama(panoEl, {
            position: position,
            pov: { heading: 165, pitch: 0 },
            zoom: 1
          });
          panoEl.scrollIntoView({ behavior: 'smooth' });
        });

        // 生成右側面板
        const li = document.createElement('li');
        li.className = 'stop-item';
        li.innerHTML = `
          <div class="stop-badge">${stop.sequence}</div>
          <div class="stop-info">
            <div class="stop-name">${stop.stop_name}</div>
            <div class="stop-time">⏱️ 發車時間：${stop.arrival_time}</div>
          </div>
        `;
        
        li.addEventListener('click', () => {
          map.setCenter(position);
          map.setZoom(16);
          
          const panoEl = document.getElementById('pano');
          panoEl.style.display = 'block';
          new google.maps.StreetViewPanorama(panoEl, {
            position: position,
            pov: { heading: 165, pitch: 0 },
            zoom: 1
          });
panoEl.scrollIntoView({ behavior: 'smooth' });
});
ul.appendChild(li);
});
sidebarContent.innerHTML = '';
sidebarContent.appendChild(ul);
// 道路規劃與劃線演算法
try {
const directionsService = new google.maps.DirectionsService();
const origin = pathCoordinates[0];
const destination = pathCoordinates[pathCoordinates.length - 1];
const waypoints = [];
for (let i = 1; i < pathCoordinates.length - 1; i++) {
waypoints.push({
location: pathCoordinates[i],
stopover: true
});
}
directionsService.route({
origin: origin,
destination: destination,
waypoints: waypoints,
optimizeWaypoints: false,
travelMode: google.maps.TravelMode.DRIVING
}, function(response, status) {
if (status === google.maps.DirectionsStatus.OK) {
const legs = response.routes.legs;
const roadPath = [];
legs.forEach(leg => {
leg.steps.forEach(step => {
step.path.forEach(point => roadPath.push(point));
});
});
routeLine = new google.maps.Polyline({
path: roadPath,
geodesic: true,
strokeColor: '#ef4444',
strokeOpacity: 0.8,
strokeWeight: 5
});
routeLine.setMap(map);
} else {
console.warn('Google 道路導航 API 規劃未通過，狀態碼: ' + status + '。改由強制直線繪製方案。');
drawBackupStraightLine(pathCoordinates);
}
});
} catch (err) {
console.error('導航引擎解析攔截錯誤，啟動直線對接機制：', err);
drawBackupStraightLine(pathCoordinates);
}
map.fitBounds(bounds);
}
window.initMap = initMap;

</script>
  </body>
</html>
