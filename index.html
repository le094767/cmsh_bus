<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>協同中學校車路線與時刻查詢系統</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f8f9fa;
      color: #333;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }
    h2 {
      margin-top: 0;
      color: #1e3a8a;
      border-bottom: 2px solid #e5e7eb;
      padding-bottom: 10px;
    }
    
    /* 調整選單與搜尋控制區塊 */
    .control-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 20px;
      background: #f0f4f8;
      padding: 15px;
      border-radius: 6px;
    }
    .control-group {
      flex: 1;
      min-width: 280px;
    }
    label {
      font-weight: bold;
      display: block;
      margin-bottom: 8px;
    }
    select {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background-color: #fff;
    }
    
    /* 搜尋框與按鈕排版 */
    .search-box {
      display: flex;
      gap: 8px;
    }
    input[type="text"] {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      background-color: #1e3a8a;
      color: white;
      border: none;
      padding: 0 16px;
      font-size: 16px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #1d4ed8;
    }
    
    /* 固定電腦版左右並排 */
    .main-content {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }
    .map-container {
      flex: 7;
      min-width: 0;
    }
    .sidebar {
      flex: 3;
      background-color: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 15px;
      max-height: 450px;
      overflow-y: auto;
    }
    
    #map {
      height: 450px;
      width: 100%;
      border-radius: 6px;
      border: 1px solid #e5e7eb;
      background-color: #eaeaea;
    }
    #pano {
      height: 300px;
      width: 100%;
      border-radius: 6px;
      border: 1px solid #e5e7eb;
      display: none;
      margin-top: 20px;
    }
    .hint {
      font-size: 14px;
      color: #6b7280;
      margin-top: 5px;
    }

    /* 時刻表樣式 */
    .sidebar-title {
      font-size: 18px;
      font-weight: bold;
      color: #1e3a8a;
      margin-top: 0;
      margin-bottom: 15px;
      border-bottom: 1px solid #d1d5db;
      padding-bottom: 8px;
    }
    .stop-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .stop-item {
      display: flex;
      align-items: flex-start;
      margin-bottom: 15px;
      cursor: pointer;
      padding: 8px;
      border-radius: 4px;
      transition: background-color 0.2s;
    }
    .stop-item:hover {
      background-color: #e5e7eb;
    }
    .stop-badge {
      color: white;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      margin-right: 12px;
      flex-shrink: 0;
    }
    .stop-info {
      display: flex;
      flex-direction: column;
    }
    .stop-name {
      font-weight: bold;
      font-size: 15px;
      color: #1f2937;
    }
    .stop-time {
      font-size: 13px;
      color: #2563eb;
      margin-top: 2px;
      font-weight: 500;
    }
    .stop-end {
      font-size: 13px;
      color: #0d9488; 
      margin-top: 2px;
      font-weight: bold;
    }
    .empty-sidebar-hint {
      color: #9ca3af;
      text-align: center;
      padding: 40px 0;
      font-size: 14px;
    }

    /* 進階標記基礎樣式 */
    .custom-marker-pin {
      color: white;
      font-weight: bold;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
      border: 2px solid #fff;
      font-size: 12px;
    }

    /* 🏠 自家地址進階標記專用黃金星星樣式 */
    .home-marker-pin {
      background-color: #fbbf24; /* 醒目的亮黃色 */
      color: #1e3a8a;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
      border: 3px solid #fff;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <div class="container">
   
    <h2>🚌 協同中學校車路線與時刻查詢系統</h2>
    
    <!-- 頂部控制面板：合併路線與地址搜尋 -->
    <div class="control-panel">
      <div class="control-group">
        <label for="routeSelect">請選擇校車路線：</label>
        <select id="routeSelect" onchange="loadSelectedRoute()">
          <option value="">-- 讀取路線中 --</option>
        </select>
      </div>
      
      <div class="control-group">
        <label for="addressInput">🏠 輸入您的住家地址（尋找最近搭車點）：</label>
        <div class="search-box">
          <input type="text" id="addressInput" placeholder="請輸入地址，例如：嘉義縣民雄鄉建國路..." onkeypress="if(event.keyCode==13) searchAddress()">
          <button onclick="searchAddress()">搜尋</button>
        </div>
      </div>
    </div>
    <p class="hint">💡 提示：您可保持在「全校所有站點」視角下搜尋地址，以便對照各路線與您家的距離。</p>
    
    <div class="main-content">
      <div class="map-container">
        <div id="map"></div>
      </div>
      
      <div class="sidebar">
        <div class="sidebar-title">⏱️ 站點與發車時刻</div>
        <div id="sidebarContent">
          <div class="empty-sidebar-hint">請由上方下拉選單切換單一路線</div>
        </div>
      </div>
    </div>
    
    <div id="pano"></div>
  </div>
<script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA6X_jnYl1SBCbEPMiiTEHOCAudU3J451M&loading=async&callback=initMap"> </script>
  <script>
    let map;
    let globalData = [];
    let markers = [];
    let homeMarker = null; // 用來存放家長住家標記的獨立變數
    let AdvancedMarkerElementClass = null;
    let routeColorMap = {};

    const COLOR_PALETTE = [
      '#e11d48', '#2563eb', '#16a34a', '#ea580c', 
      '#9333ea', '#0d9488', '#db2777', '#4b5563',
      '#F2CD37', '#C91A09', '#0055BF', '#4B9F4A',
      '#A0A5A9', '#55595C', '#720E0F', '#06193F',
      '#184632', '#5C3526', '#372115', '#708E7A',
      '#5A778D', '#958A73', '#E4CD9E', '#77774E',
      '#FE8A18', '#E4ADC8', '#B492C4', '#92397A',
      '#F6D7B3', '#ADC3C0', '#008F9B', '#AA7F2A'
    ];

    // 1. 初始化 Google 地圖
    async function initMap() {
      try {
        map = new google.maps.Map(document.getElementById('map'), {
          center: { lat: 23.456, lng: 120.462 }, 
          zoom: 12,
          mapTypeControl: false,
          mapId: "SCHOOL_BUS_MAP_ID" 
        });

        const { AdvancedMarkerElement } = await google.maps.importLibrary("marker");
        AdvancedMarkerElementClass = AdvancedMarkerElement;

        autoFetchJson();
      } catch (e) {
        console.error("地圖載入或函式庫提取失敗:", e);
      }
    }

    // 2. 自動讀取 JSON 檔案
    async function autoFetchJson() {
      const JSON_URL = 'https://raw.githubusercontent.com/le094767/cmsh_bus/refs/heads/main/bus_data.json';
      try {
        const response = await fetch(JSON_URL);
        if (!response.ok) throw new Error('檔案讀取失敗');
        const data = await response.json();
        processRouteData(data);
      } catch (error) {
        console.error('讀取 JSON 失敗：', error);
        document.getElementById('routeSelect').innerHTML = '<option value="">-- 無法載入路線資料 --</option>';
      }
    }

    // 3. 解析 JSON、動態分配色彩並產生初始全站點畫面
    function processRouteData(data) {
      globalData = data;
      const uniqueRoutes = [];
      const seen = new Set();
      
      let colorIndex = 0;
      globalData.forEach(row => {
        if (row.route_id && !seen.has(row.route_id)) {
          seen.add(row.route_id);
          uniqueRoutes.push({ id: row.route_id, name: row.route_name });
          routeColorMap[row.route_id] = COLOR_PALETTE[colorIndex % COLOR_PALETTE.length];
          colorIndex++;
        }
      });

      const select = document.getElementById('routeSelect');
      if (uniqueRoutes.length === 0) {
        select.innerHTML = '<option value="">-- 無有效路線資料 --</option>';
        return;
      }

      select.innerHTML = '<option value="">-- 查看全校所有站點 --</option>';
      uniqueRoutes.forEach(route => {
        const opt = document.createElement('option');
        opt.value = route.id;
        opt.innerText = route.name;
        select.appendChild(opt);
      });

      renderAllStopsToMap();
    }

    // 4. 初始頁面呈現全校所有路線的校車點
    function renderAllStopsToMap() {
      markers.forEach(m => m.map = null);
      markers = [];
      document.getElementById('pano').style.display = 'none';
      document.getElementById('sidebarContent').innerHTML = '<div class="empty-sidebar-hint">💡 目前為全校點位檢視模式。<br>請由上方選單切換特定路線來查看發車時刻表</div>';

      // 💡 如果畫面上有殘留的住家標記，保留它，不清除
      if (homeMarker) homeMarker.map = map;

      const bounds = new google.maps.LatLngBounds();
      const activeStops = globalData.filter(row => row.is_active === true || row.is_active === "TRUE");

      if (activeStops.length === 0) return;

      activeStops.forEach((stop) => {
        const position = { lat: parseFloat(stop.lat), lng: parseFloat(stop.lng) };
        bounds.extend(position);

        const routeColor = routeColorMap[stop.route_id] || '#ef4444';

        const markerTag = document.createElement("div");
        markerTag.className = "custom-marker-pin";
        markerTag.style.backgroundColor = routeColor;
        markerTag.innerText = stop.sequence.toString();

        if (AdvancedMarkerElementClass) {
          const advancedMarker = new AdvancedMarkerElementClass({
            map: map,
            position: position,
            content: markerTag,
            title: `${stop.stop_name} (${stop.arrival_time})`
          });
          markers.push(advancedMarker);

          const infoWindow = new google.maps.InfoWindow({
            content: `<div style="padding:5px;"><strong>[${stop.route_name}] ${stop.stop_name}</strong><br>時間：${stop.arrival_time}</div>`
          });
          
          advancedMarker.element.addEventListener('mouseover', () => infoWindow.open(map, advancedMarker));
          advancedMarker.element.addEventListener('mouseout', () => infoWindow.close());
          advancedMarker.addListener('click', () => triggerStreetView(position));
        }
      });
      // 如果有住家標記，把住家位置也包進縮放視角內
      if (homeMarker) bounds.extend(homeMarker.position);
      map.fitBounds(bounds);
    }
    // 5. 切換選單：特定路線單獨檢視與時刻表渲染
    function loadSelectedRoute() {
      const selectedRouteId = document.getElementById('routeSelect').value;
      const sidebarContent = document.getElementById('sidebarContent');
      if (!selectedRouteId) {
        renderAllStopsToMap();
        return;
      }
      markers.forEach(m => m.map = null);
      markers = [];
      document.getElementById('pano').style.display = 'none';
      // 保留住家標記
      if (homeMarker) homeMarker.map = map;
      const routeStops = globalData
        .filter(row => row.route_id === selectedRouteId && (row.is_active === true || row.is_active === "TRUE"))
        .sort((a, b) => parseInt(a.sequence) - parseInt(b.sequence));
      if (routeStops.length === 0) {
        sidebarContent.innerHTML = '該路線無有效資料';
        return;
      }
      const ul = document.createElement('ul');
      ul.className = 'stop-list';
      const bounds = new google.maps.LatLngBounds();
      const currentRouteColor = routeColorMap[selectedRouteId] || '#1e3a8a';
      routeStops.forEach((stop, index) => {
        const position = { lat: parseFloat(stop.lat), lng: parseFloat(stop.lng) };
        bounds.extend(position);
        const markerTag = document.createElement("div");
        markerTag.className = "custom-marker-pin";
        markerTag.style.backgroundColor = currentRouteColor;
        markerTag.innerText = stop.sequence.toString();
        if (AdvancedMarkerElementClass) {
          const advancedMarker = new AdvancedMarkerElementClass({
            map: map,
            position: position,
            content: markerTag,
            title: `${stop.stop_name} (${stop.arrival_time})`
          });
          markers.push(advancedMarker);
          const infoWindow = new google.maps.InfoWindow({
            content: `<div style="padding:5px;"><strong>${stop.stop_name}</strong><br>預估到站時間：${stop.arrival_time}</div>`
          });
          advancedMarker.element.addEventListener('mouseover', () => infoWindow.open(map, advancedMarker));
          advancedMarker.element.addEventListener('mouseout', () => infoWindow.close());
          advancedMarker.addListener('click', () => triggerStreetView(position));
        }
        const isLastStop = (index === routeStops.length - 1);
        let timeInfoHtml = '';
        if (isLastStop) {
          timeInfoHtml = `<div class="stop-end">🏁 抵達時間：${stop.arrival_time}</div>`;
        } else {
          timeInfoHtml = `<div class="stop-time">⏱️ 發車時間：${stop.arrival_time}</div>`;
        }
        const li = document.createElement('li');
        li.className = 'stop-item';
        li.innerHTML = `<div class="stop-badge" style="background-color: ${currentRouteColor};">${stop.sequence}</div> <div class="stop-info"> <div class="stop-name">${stop.stop_name}</div> ${timeInfoHtml} </div>`;
        li.addEventListener('click', () => {
          map.setCenter(position);
          map.setZoom(16);
          triggerStreetView(position);
        });
        ul.appendChild(li);
      });
      sidebarContent.innerHTML = '';
      sidebarContent.appendChild(ul);
      if (homeMarker) bounds.extend(homeMarker.position);
      map.fitBounds(bounds);
    }
    // ✨ 新增核心：地址編碼搜尋功能
    function searchAddress() {
      const address = document.getElementById('addressInput').value.trim();
      if (!address) {
        alert('請先輸入地址再進行搜尋！');
        return;
      }
      // 實例化 Google 地理編碼服務
      const geocoder = new google.maps.Geocoder();
      geocoder.geocode({ address: address }, function(results, status) {
        if (status === 'OK' && results[0]) {
          const homePosition = results[0].geometry.location;
          // 如果地圖上已經有舊的住家圖標，先移除
          if (homeMarker) {
            homeMarker.map = null;
          }
          // 建立一個獨特的黃金星星 HTML 圖標外觀
          const homeTag = document.createElement("div");
          homeTag.className = "home-marker-pin";
          homeTag.innerText = "⭐"; // 用星星符號標記住家
          // 在搜尋到的地址位置，打上住家進階標記
          if (AdvancedMarkerElementClass) {
            homeMarker = new AdvancedMarkerElementClass({
              map: map,
              position: homePosition,
              content: homeTag,
              title: `您的住家位置：${address}`
            });
            // 建立住家點擊的訊息泡泡
            const homeInfoWindow = new google.maps.InfoWindow({
              content: `<div style="padding:5px;font-weight:bold;color:#1e3a8a;">🏠 您的住家位置</div>`
            });
            homeInfoWindow.open(map, homeMarker);
          }
          // 地圖立即聚焦到住家位置，並適度放大方便家長人肉比對最近的數字圓圈
          map.setCenter(homePosition);
          map.setZoom(15);
          console.log("【地址搜尋成功】住家經緯度為:", homePosition.lat(), homePosition.lng());
        } else {
          alert('找不到該地址，請確認地址輸入是否正確（建議加上縣市名稱，如：嘉義縣民雄鄉...）。');
        }
      });
    }
    // 共用街景函式
    function triggerStreetView(pos) {
      const panoEl = document.getElementById('pano');
      panoEl.style.display = 'block';
      new google.maps.StreetViewPanorama(panoEl, {
        position: pos,
        pov: { heading: 165, pitch: 0 },
        zoom: 1
      });
      panoEl.scrollIntoView({ behavior: 'smooth' });
    }
    window.initMap = initMap;
  </script>
</body>
</html>
