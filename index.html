<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校車路線與時刻查詢系統</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f8f9fa;
      color: #333;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }
    h2 {
      margin-top: 0;
      color: #1e3a8a;
      border-bottom: 2px solid #e5e7eb;
      padding-bottom: 10px;
    }
    .select-group {
      margin-bottom: 20px;
    }
    label {
      font-weight: bold;
      display: block;
      margin-bottom: 8px;
    }
    select {
      width: 100%;
      max-width: 400px;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background-color: #fff;
    }
    
    /* 左右兩欄主排版 */
    .main-content {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }
    .map-container {
      flex: 7; /* 地圖佔 7 成寬度 */
      min-width: 0;
    }
    .sidebar {
      flex: 3; /* 側邊欄佔 3 成寬度 */
      background-color: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 15px;
      max-height: 450px;
      overflow-y: auto; /* 站點太多時自動出現滾動條 */
    }
    
    #map {
      height: 450px;
      width: 100%;
      border-radius: 6px;
      border: 1px solid #e5e7eb;
    }
    #pano {
      height: 300px;
      width: 100%;
      border-radius: 6px;
      border: 1px solid #e5e7eb;
      display: none;
    }
    .hint {
      font-size: 14px;
      color: #6b7280;
      margin-top: 5px;
    }

    /* 側邊欄時間軸樣式 */
    .sidebar-title {
      font-size: 18px;
      font-weight: bold;
      color: #1e3a8a;
      margin-top: 0;
      margin-bottom: 15px;
      border-bottom: 1px solid #d1d5db;
      padding-bottom: 8px;
    }
    .stop-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .stop-item {
      display: flex;
      align-items: flex-start;
      margin-bottom: 15px;
      cursor: pointer;
      padding: 8px;
      border-radius: 4px;
      transition: background-color 0.2s;
    }
    .stop-item:hover {
      background-color: #e5e7eb; /* 滑鼠懸停特效 */
    }
    .stop-badge {
      background-color: #1e3a8a;
      color: white;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      margin-right: 12px;
      flex-shrink: 0;
    }
    .stop-info {
      display: flex;
      flex-direction: column;
    }
    .stop-name {
      font-weight: bold;
      font-size: 15px;
      color: #1f2937;
    }
    .stop-time {
      font-size: 13px;
      color: #2563eb;
      margin-top: 2px;
      font-weight: 500;
    }
    .empty-sidebar-hint {
      color: #9ca3af;
      text-align: center;
      padding: 40px 0;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>🚌 校車路線時刻查詢</h2>
    
    <div class="select-group">
      <label for="routeSelect">請選擇校車路線：</label>
      <select id="routeSelect" onchange="loadSelectedRoute()">
        <option value="">-- 請選擇 --</option>
      </select>
      <p class="hint">💡 提示：點擊地圖標記或右側站點名稱，下方可查看 Google 實景街景影像。</p>
    </div>
    
    <!-- 左右側並排區塊 -->
    <div class="main-content">
      <!-- 左側：地圖 -->
      <div class="map-container">
        <div id="map"></div>
      </div>
      
      <!-- 右側：站點時刻清單 -->
      <div class="sidebar">
        <div class="sidebar-title">⏱️ 站點與發車時刻</div>
        <div id="sidebarContent">
          <div class="empty-sidebar-hint">請先選擇上方校車路線</div>
        </div>
      </div>
    </div>
    
    <!-- 下方：Google 街景 -->
    <div id="pano"></div>
  </div>
  <script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA6X_jnYl1SBCbEPMiiTEHOCAudU3J451M&loading=async&callback=initMap"> 
  <!-- 主程式邏輯指令碼：優先讓瀏覽器載入並定義好 initMap 函式 -->
  <script>
    let map;
    let globalData = [];
    let markers = [];
    let routeLine = null;

    // 1. 初始化 Google 地圖 (確保此函式在 API 讀取前先被瀏覽器認得)
    function initMap() {
      map = new google.maps.Map(document.getElementById('map'), {
        center: { lat: 23.555, lng: 120.428 },
        zoom: 12,
        mapTypeControl: false
      });
      fetchRoutes();
    }

    // 2. 讀取 JSON 資料
    async function fetchRoutes() {
      // ⚠️ 如果是在本機直接測試，請將此行網址改為 'bus_data.json' 即可
      // ⚠️ 如果已部署到 GitHub，請替換為您在 GitHub 儲存庫中的 Raw 連結
      const GITHUB_JSON_URL = 'https://raw.githubusercontent.com/le094767/cmsh_bus/refs/heads/main/bus_data.json';
      
      try {
        const response = await fetch(GITHUB_JSON_URL);
        if (!response.ok) throw new Error('網路回應不成功');
        globalData = await response.json();
        
        const uniqueRoutes = [];
        const seen = new Set();
        
        globalData.forEach(row => {
          if (row.route_id && !seen.has(row.route_id)) {
            seen.add(row.route_id);
            uniqueRoutes.push({ id: row.route_id, name: row.route_name });
          }
        });

        const select = document.getElementById('routeSelect');
        uniqueRoutes.forEach(route => {
          const opt = document.createElement('option');
          opt.value = route.id;
          opt.innerText = route.name;
          select.appendChild(opt);
        });
        
      } catch (error) {
        console.error('讀取校車資料失敗:', error);
        alert('無法載入校車路線資料，請檢查 JSON 檔案路徑。');
      }
    }

    // 3. 切換路線：渲染地圖與右側清單
    function loadSelectedRoute() {
      const selectedRouteId = document.getElementById('routeSelect').value;
      const sidebarContent = document.getElementById('sidebarContent');
      
      // 清除舊元件
      markers.forEach(m => m.setMap(null));
      markers = [];
      if (routeLine) {
        routeLine.setMap(null);
        routeLine = null;
      }
      document.getElementById('pano').style.display = 'none';

      if (!selectedRouteId) {
        sidebarContent.innerHTML = '<div class="empty-sidebar-hint">請先選擇上方校車路線</div>';
        return;
      }

      const routeStops = globalData
        .filter(row => row.route_id === selectedRouteId && (row.is_active === true || row.is_active === "TRUE"))
        .sort((a, b) => parseInt(a.sequence) - parseInt(b.sequence));

      if (routeStops.length === 0) {
        sidebarContent.innerHTML = '<div class="empty-sidebar-hint" style="color:#ef4444;">該路線無有效資料</div>';
        alert('該路線目前無有效的站點資料。');
        return;
      }

      // 建立右側 HTML 清單容器
      const ul = document.createElement('ul');
      ul.className = 'stop-list';

      const pathCoordinates = [];
      const bounds = new google.maps.LatLngBounds();

      routeStops.forEach((stop, index) => {
        const position = { lat: parseFloat(stop.lat), lng: parseFloat(stop.lng) };
        pathCoordinates.push(position);
        bounds.extend(position);

        // A. 地圖打點
        const marker = new google.maps.Marker({
          position: position,
          map: map,
          label: {
            text: stop.sequence.toString(),
            color: "#ffffff",
            fontWeight: "bold"
          },
          title: `${stop.stop_name} (${stop.arrival_time})`,
          zIndex: 99
        });
        markers.push(marker);

        const infoWindow = new google.maps.InfoWindow({
          content: `<div style="padding:5px;"><strong>${stop.stop_name}</strong><br>預估到站時間：${stop.arrival_time}</div>`
        });

        marker.addListener('mouseover', () => infoWindow.open(map, marker));
        marker.addListener('mouseout', () => infoWindow.close());

        // 定義開啟街景的共用函數
        const triggerStreetView = () => {
          const panoEl = document.getElementById('pano');
          panoEl.style.display = 'block';
          new google.maps.StreetViewPanorama(panoEl, {
            position: position,
            pov: { heading: 165, pitch: 0 },
            zoom: 1
          });
          panoEl.scrollIntoView({ behavior: 'smooth' });
        };

        // 地圖圖標點擊觸發街景
        marker.addListener('click', triggerStreetView);

        // B. 動態生成右側清單項目 (Row)
        const li = document.createElement('li');
        li.className = 'stop-item';
        li.innerHTML = `
          <div class="stop-badge">${stop.sequence}</div>
          <div class="stop-info">
            <div class="stop-name">${stop.stop_name}</div>
            <div class="stop-time">⏱️ 發車時間：${stop.arrival_time}</div>
          </div>
        `;
        
        // 點擊右側清單項目時：地圖中心移過去，並同時觸發下方街景
        li.addEventListener('click', () => {
          map.setCenter(position);
          map.setZoom(16); // 稍微放大聚焦
          triggerStreetView();
        });

        ul.appendChild(li);
      });

      // 將生成好的清單塞入右側側邊欄
      sidebarContent.innerHTML = '';
      sidebarContent.appendChild(ul);

      // 4. 呼叫 Google Directions API 進行真實道路導航連線
      const directionsService = new google.maps.DirectionsService();
      const origin = { lat: parseFloat(routeStops[0].lat), lng: parseFloat(routeStops[0].lng) };
      const destination = { lat: parseFloat(routeStops[routeStops.length - 1].lat), lng: parseFloat(routeStops[routeStops.length - 1].lng) };
      
      const waypoints = [];
      for (let i = 1; i < routeStops.length - 1; i++) {
        waypoints.push({
          location: { lat: parseFloat(routeStops[i].lat), lng: parseFloat(routeStops[i].lng) },
          stopover: true
        });
      }

      directionsService.route({
        origin: origin,
        destination: destination,
        waypoints: waypoints,
        optimizeWaypoints: false,
        travelMode: google.maps.TravelMode.DRIVING
      }, function(response, status) {
        if (status === google.maps.DirectionsStatus.OK) {
          const legs = response.routes.legs;
          const roadPath = [];
          legs.forEach(leg => {
            leg.steps.forEach(step => {
              step.path.forEach(point => roadPath.push(point));
              });
          });
          routeLine = new google.maps.Polyline({
            path: roadPath,
            geodesic: true,
            strokeColor: '#ef4444',
            strokeOpacity: 0.8,
            strokeWeight: 5
          });
          routeLine.setMap(map);
        } else {
          console.error('道路路徑規劃失敗，原因: ' + status);drawBackupStraightLine(routeStops);
        }
      });
      map.fitBounds(bounds);
    }
    // 備用方案
    function drawBackupStraightLine(routeStops) {
      const pathCoordinates = routeStops.map(stop => ({ lat: parseFloat(stop.lat), lng:
        parseFloat(stop.lng) }));
      routeLine = new google.maps.Polyline({
        path: pathCoordinates,
        geodesic: true,
        strokeColor: '#ffbb00',
        strokeOpacity: 0.8,
        strokeWeight: 4
      });
      routeLine.setMap(map);
    }
