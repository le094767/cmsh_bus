<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校車路線與時刻查詢系統</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f8f9fa;
      color: #333;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }
    h2 {
      margin-top: 0;
      color: #1e3a8a;
      border-bottom: 2px solid #e5e7eb;
      padding-bottom: 10px;
    }
    .select-group {
      margin-bottom: 20px;
      background: #f0f4f8;
      padding: 15px;
      border-radius: 6px;
    }
    label {
      font-weight: bold;
      display: block;
      margin-bottom: 8px;
    }
    select {
      width: 100%;
      max-width: 400px;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background-color: #fff;
    }
    
    /* 左右兩欄主排版 */
    .main-content {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }
    .map-container {
      flex: 7;
      min-width: 0;
    }
    .sidebar {
      flex: 3;
      background-color: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 15px;
      max-height: 450px;
      overflow-y: auto;
    }
    
    #map {
      height: 450px;
      width: 100%;
      border-radius: 6px;
      border: 1px solid #e5e7eb;
      background-color: #eaeaea;
    }
    #pano {
      height: 300px;
      width: 100%;
      border-radius: 6px;
      border: 1px solid #e5e7eb;
      display: none;
      margin-top: 20px;
    }
    .hint {
      font-size: 14px;
      color: #6b7280;
      margin-top: 5px;
    }
    .local-file-box {
      margin-top: 10px;
      font-size: 13px;
      color: #b91c1c;
    }

    /* 側邊欄時間軸樣式 */
    .sidebar-title {
      font-size: 18px;
      font-weight: bold;
      color: #1e3a8a;
      margin-top: 0;
      margin-bottom: 15px;
      border-bottom: 1px solid #d1d5db;
      padding-bottom: 8px;
    }
    .stop-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .stop-item {
      display: flex;
      align-items: flex-start;
      margin-bottom: 15px;
      cursor: pointer;
      padding: 8px;
      border-radius: 4px;
      transition: background-color 0.2s;
    }
    .stop-item:hover {
      background-color: #e5e7eb;
    }
    .stop-badge {
      background-color: #1e3a8a;
      color: white;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      margin-right: 12px;
      flex-shrink: 0;
    }
    .stop-info {
      display: flex;
      flex-direction: column;
    }
    .stop-name {
      font-weight: bold;
      font-size: 15px;
      color: #1f2937;
    }
    .stop-time {
      font-size: 13px;
      color: #2563eb;
      margin-top: 2px;
      font-weight: 500;
    }
    .empty-sidebar-hint {
      color: #9ca3af;
      text-align: center;
      padding: 40px 0;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>🚌 校車路線時刻查詢</h2>
    
    <div class="select-group">
      <label for="routeSelect">請選擇校車路線：</label>
      <select id="routeSelect" onchange="loadSelectedRoute()">
        <option value="">-- 請先載入資料 --</option>
      </select>
      <p class="hint">💡 提示：點擊地圖標記或右側站點名稱，下方可查看 Google 實景街景影像。</p>
      
      <!-- 容錯備用機制：解決點兩下打開 HTML 被瀏覽器限制讀取 JSON 的問題 -->
      <div class="local-file-box">
        🛠️ <b>本機離線測試功能</b>：如果下拉選單沒跑出來，請點此選取您的 <b>bus_data.json</b>：
        <input type="file" id="jsonFileInput" accept=".json" onchange="handleFileSelect(event)">
      </div>
    </div>
    
    <div class="main-content">
      <div class="map-container">
        <div id="map"></div>
      </div>
      
      <div class="sidebar">
        <div class="sidebar-title">⏱️ 站點與發車時刻</div>
        <div id="sidebarContent">
          <div class="empty-sidebar-hint">請先選擇上方校車路線</div>
        </div>
      </div>
    </div>
    
    <div id="pano"></div>
  </div>

  <script>
    let map;
    let globalData = [];
    let markers = [];
    let routeLine = null;

    // 1. 初始化 Google 地圖
    function initMap() {
      map = new google.maps.Map(document.getElementById('map'), {
        center: { lat: 23.456, lng: 120.462 }, // 預設定位在您嘉義第一個站點附近
        zoom: 12,
        mapTypeControl: false
      });
      autoFetchJson();
    }

    // 2-A. 自動讀取同資料夾底下的 JSON 檔案（上傳到 GitHub 後會自動運作此段）
    async function autoFetchJson() {
      // ⚠️ 如果已部署到 GitHub，請將 'bus_data.json' 替換為您在 GitHub 上的 Raw 遠端網址
      const JSON_URL = 'https://raw.githubusercontent.com/le094767/cmsh_bus/refs/heads/main/bus_data.json';
      try {
        const response = await fetch(JSON_URL);
        if (!response.ok) throw new Error('CORS 阻擋或檔案不存在');
        const data = await response.json();
        processRouteData(data);
      } catch (error) {
        console.warn('自動讀取本地 JSON 被瀏覽器核心阻擋，請手動使用【選擇檔案】按鈕載入。', error);
      }
    }

    // 2-B. 離線容錯機制：手動選擇檔案載入（完全無視瀏覽器的本機限制）
    function handleFileSelect(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          processRouteData(data);
          alert('校車資料載入成功！請點選上方下拉選單切換路線。');
        } catch (err) {
          alert('讀取失敗，請確認選擇的檔案是否為正確的 JSON 格式。');
        }
      };
      reader.readAsText(file);
    }

    // 2-C. 解析 JSON 並把路線塞進選單
    function processRouteData(data) {
      globalData = data;
      const uniqueRoutes = [];
      const seen = new Set();
      
      globalData.forEach(row => {
        if (row.route_id && !seen.has(row.route_id)) {
          seen.add(row.route_id);
          uniqueRoutes.push({ id: row.route_id, name: row.route_name });
        }
      });

      const select = document.getElementById('routeSelect');
      select.innerHTML = '<option value="">-- 請選擇路線 --</option>';
      
      uniqueRoutes.forEach(route => {
        const opt = document.createElement('option');
        opt.value = route.id;
        opt.innerText = route.name;
        select.appendChild(opt);
      });
    }

    // 3. 切換路線：渲染地圖與右側清單
    function loadSelectedRoute() {
      const selectedRouteId = document.getElementById('routeSelect').value;
      const sidebarContent = document.getElementById('sidebarContent');
      
      // 清空舊的標記與線段
      markers.forEach(m => m.setMap(null));
      markers = [];
      if (routeLine) {
        routeLine.setMap(null);
        routeLine = null;
      }
      document.getElementById('pano').style.display = 'none';

      if (!selectedRouteId) {
        sidebarContent.innerHTML = '<div class="empty-sidebar-hint">請先選擇上方校車路線</div>';
        return;
      }

      // 精準過濾並排序（相容您的大小寫 "TRUE" 與字串型態的 sequence）
      const routeStops = globalData
        .filter(row => row.route_id === selectedRouteId && (row.is_active === true || row.is_active === "TRUE"))
        .sort((a, b) => parseInt(a.sequence) - parseInt(b.sequence));

      if (routeStops.length === 0) {
        sidebarContent.innerHTML = '<div class="empty-sidebar-hint" style="color:#ef4444;">該路線無有效資料</div>';
        return;
      }

      const ul = document.createElement('ul');
      ul.className = 'stop-list';

      const pathCoordinates = [];
      const bounds = new google.maps.LatLngBounds();

      routeStops.forEach((stop) => {
        const position = { lat: parseFloat(stop.lat), lng: parseFloat(stop.lng) };
        pathCoordinates.push(position);
        bounds.extend(position);

        // A. 地圖上的 Marker
        const marker = new google.maps.Marker({
          position: position,
          map: map,
          label: {
            text: stop.sequence.toString(),
            color: "#ffffff",
            fontWeight: "bold"
          },
          title: `${stop.stop_name} (${stop.arrival_time})`,
          zIndex: 99
        });
        markers.push(marker);

        // 懸停顯示小視窗
        const infoWindow = new google.maps.InfoWindow({
          content: `<div style="padding:5px;"><strong>${stop.stop_name}</strong><br>預估到站時間：${stop.arrival_time}</div>`
        });
        marker.addListener('mouseover', () => infoWindow.open(map, marker));
        marker.addListener('mouseout', () => infoWindow.close());

        // 觸發街景函數
        const triggerStreetView = () => {
          const panoEl = document.getElementById('pano');
          panoEl.style.display = 'block';
          new google.maps.StreetViewPanorama(panoEl, {
            position: position,
            pov: { heading: 165, pitch: 0 },
            zoom: 1
          });
          panoEl.scrollIntoView({ behavior: 'smooth' });
        };

        marker.addListener('click', triggerStreetView);

        // B. 右側時刻表項目
        const li = document.createElement('li');
        li.className = 'stop-item';
        li.innerHTML = `
          <div class="stop-badge">${stop.sequence}</div>
          <div class="stop-info">
            <div class="stop-name">${stop.stop_name}</div>
            <div class="stop-time">⏱️ 發車時間：${stop.arrival_time}</div>
          </div>
        `;
        
        li.addEventListener('click', () => {
          map.setCenter(position);
          map.setZoom(16);
          triggerStreetView();
        });

        ul.appendChild(li);
      });

      sidebarContent.innerHTML = '';
      sidebarContent.appendChild(ul);

      // 4. 呼叫 Google Directions API 依道路路徑連線
      const directionsService = new google.maps.DirectionsService();
      
      // ✨ 精準修正：提取陣列的第一站與最後一站作為導航端點
      const origin = { lat: parseFloat(routeStops[0].lat), lng: parseFloat(routeStops[0].lng) };
const destination = { lat: parseFloat(routeStops[routeStops.length - 1].lat), lng: parseFloat(routeStops[routeStops.length - 1].lng) };
const waypoints = [];
for (let i = 1; i < routeStops.length - 1; i++) {
waypoints.push({
location: { lat: parseFloat(routeStops[i].lat), lng: parseFloat(routeStops[i].lng) },
stopover: true
});
}
directionsService.route({
origin: origin,
destination: destination,
waypoints: waypoints,
optimizeWaypoints: false,
travelMode: google.maps.TravelMode.DRIVING
}, function(response, status) {
if (status === google.maps.DirectionsStatus.OK) {
const legs = response.routes.legs;
const roadPath = [];
legs.forEach(leg => {
leg.steps.forEach(step => {
step.path.forEach(point => roadPath.push(point));
});
});
routeLine = new google.maps.Polyline({
path: roadPath,
geodesic: true,
strokeColor: '#ef4444',
strokeOpacity: 0.8,
strokeWeight: 5
});
routeLine.setMap(map);
} else {
console.warn('道路路徑規劃不可用（原因: ' + status + '），自動切換為直線連線。');
drawBackupStraightLine(routeStops);
}
});
map.fitBounds(bounds);
}
// 備用直線連線方案
function drawBackupStraightLine(routeStops) {
const pathCoordinates = routeStops.map(stop => ({ lat: parseFloat(stop.lat), lng: parseFloat(stop.lng) }));
routeLine = new google.maps.Polyline({
path: pathCoordinates,
geodesic: true,
strokeColor: '#ffbb00',
strokeOpacity: 0.8,
strokeWeight: 4
});
routeLine.setMap(map);
}
