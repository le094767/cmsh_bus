<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校車路線與時刻查詢系統</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f8f9fa;
      color: #333;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }
    h2 {
      margin-top: 0;
      color: #1e3a8a;
      border-bottom: 2px solid #e5e7eb;
      padding-bottom: 10px;
    }
    .select-group {
      margin-bottom: 20px;
    }
    label {
      font-weight: bold;
      display: block;
      margin-bottom: 8px;
    }
    select {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background-color: #fff;
    }
    #map {
      height: 450px;
      width: 100%;
      border-radius: 6px;
      border: 1px solid #e5e7eb;
    }
    #pano {
      height: 300px;
      width: 100%;
      margin-top: 20px;
      border-radius: 6px;
      border: 1px solid #e5e7eb;
      display: none;
    }
    .hint {
      font-size: 14px;
      color: #6b7280;
      margin-top: 5px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>🚌 校車路線時刻查詢</h2>
    
    <div class="select-group">
      <label for="routeSelect">請選擇校車路線：</label>
      <select id="routeSelect" onchange="loadSelectedRoute()">
        <option value="">-- 請選擇 --</option>
      </select>
      <p class="hint">💡 提示：點擊地圖上的站點圖標，下方可查看 Google 實景街景影像。</p>
    </div>
    
    <!-- Google 地圖顯示區域 -->
    <div id="map"></div>
    
    <!-- Google 街景顯示區域 -->
    <div id="pano"></div>
  </div>
<script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA6X_jnYl1SBCbEPMiiTEHOCAudU3J451M&loading=async&callback=initMap"> </script>

  
  <script>
    let map;
    let globalData = [];
    let markers = [];
    let routeLine = null;

    // 1. 初始化 Google 地圖
    function initMap() {
      // 預設中心點設定在台灣中部
      map = new google.maps.Map(document.getElementById('map'), {
        center: { lat: 23.456104719767684, lng: 120.46234747761909 },
        zoom: 12,
        mapTypeControl: false
      });
      
      // 地圖載入完成後，開始拉取 JSON 資料
      fetchRoutes();
    }

    // 2. 從 GitHub 讀取 Excel 轉出的平鋪型 JSON 檔案
    async function fetchRoutes() {
      // ⚠️ 請替換為您在 GitHub 儲存庫中 bus_data.json 的 Raw (原始資料) 連結
      const GITHUB_JSON_URL = 'https://raw.githubusercontent.com/le094767/cmsh_bus/refs/heads/main/bus_data.json';
      
      try {
        const response = await fetch(GITHUB_JSON_URL);
        if (!response.ok) throw new Error('網路回應不成功');
        
        globalData = await response.json();
        
        // 自動過濾 Excel 多行資料中重複的 route_id，提取出唯一的路線清單
        const uniqueRoutes = [];
        const seen = new Set();
        
        globalData.forEach(row => {
          if (row.route_id && !seen.has(row.route_id)) {
            seen.add(row.route_id);
            uniqueRoutes.push({ id: row.route_id, name: row.route_name });
          }
        });

        // 將路線選單渲染至網頁下拉選單
        const select = document.getElementById('routeSelect');
        uniqueRoutes.forEach(route => {
          const opt = document.createElement('option');
          opt.value = route.id;
          opt.innerText = route.name;
          select.appendChild(opt);
        });
        
      } catch (error) {
        console.error('讀取校車資料失敗:', error);
        alert('無法載入校車路線資料，請檢查 GitHub 網址設定或 API 狀態。');
      }
    }

    // 3. 當使用者切換路線時，篩選平鋪資料並渲染地圖
    // 修改後的網頁邏輯：自動依循真實道路繪製校車路線
function loadSelectedRoute() {
  const selectedRouteId = document.getElementById('routeSelect').value;
  
  // 1. 清除舊的地圖標記、路線折線與街景
  markers.forEach(m => m.setMap(null));
  markers = [];
  if (routeLine) {
    routeLine.setMap(null);
    routeLine = null;
  }
  document.getElementById('pano').style.display = 'none';

  // 若未選擇任何路線則返回
  if (!selectedRouteId) return;

  // 2. 自全域資料中過濾出該路線站點，並依 sequence 排序
  const routeStops = globalData
    .filter(row => row.route_id === selectedRouteId && (row.is_active === true || row.is_active === "TRUE"))
    .sort((a, b) => parseInt(a.sequence) - parseInt(b.sequence));

  if (routeStops.length === 0) {
    alert('該路線目前無有效的站點資料。');
    return;
  }

  // 3. 建立地圖圖標 (Marker) 與 資訊視窗 (InfoWindow)
  const bounds = new google.maps.LatLngBounds();
  
  routeStops.forEach(stop => {
    const position = { lat: parseFloat(stop.lat), lng: parseFloat(stop.lng) };
    bounds.extend(position);

    const marker = new google.maps.Marker({
      position: position,
      map: map,
      label: {
        text: stop.sequence.toString(),
        color: "#ffffff",
        fontWeight: "bold"
      },
      title: `${stop.stop_name} (${stop.arrival_time})`,
      zIndex: 99 // 確保圖標永遠在道路線段的上方
    });
    markers.push(marker);

    const infoWindow = new google.maps.InfoWindow({
      content: `<div style="padding:5px;"><strong>${stop.stop_name}</strong><br>預估到站時間：${stop.arrival_time}</div>`
    });

    marker.addListener('mouseover', () => infoWindow.open(map, marker));
    marker.addListener('mouseout', () => infoWindow.close());

    marker.addListener('click', () => {
      const panoEl = document.getElementById('pano');
      panoEl.style.display = 'block';
      new google.maps.StreetViewPanorama(panoEl, {
        position: position,
        pov: { heading: 165, pitch: 0 },
        zoom: 1
      });
      panoEl.scrollIntoView({ behavior: 'smooth' });
    });
  });

  // 4. 呼叫 Google Directions API 進行道路最佳路徑規劃
  const directionsService = new google.maps.DirectionsService();
  
  // 提取起點、終點、與中間所有經過的停靠站 (Waypoints)
  const origin = { lat: parseFloat(routeStops[0].lat), lng: parseFloat(routeStops[0].lng) };
  const destination = { lat: parseFloat(routeStops[routeStops.length - 1].lat), lng: parseFloat(routeStops[routeStops.length - 1].lng) };
  
  const waypoints = [];
  // 如果站點總數大於 2，把中間的站點包進 waypoints 陣列中
  for (let i = 1; i < routeStops.length - 1; i++) {
    waypoints.push({
      location: { lat: parseFloat(routeStops[i].lat), lng: parseFloat(routeStops[i].lng) },
      stopover: true // 確保校車會確實經過並停靠該路口
    });
  }

  // 發送導航請求給 Google 伺服器
  directionsService.route({
    origin: origin,
    destination: destination,
    waypoints: waypoints,
    optimizeWaypoints: false, // 嚴格按照 Excel 的 sequence 順序走，不讓 Google 自行重新排序
    travelMode: google.maps.TravelMode.DRIVING // 設定為汽車行駛模式
  }, function(response, status) {
    if (status === google.maps.DirectionsStatus.OK) {
      // 5. 撈出 Google 計算出來的真实道路經緯度軌跡
      const legs = response.routes[0].legs;
      const roadPath = [];
      
      legs.forEach(leg => {
        leg.steps.forEach(step => {
          step.path.forEach(point => {
            roadPath.push(point);
          });
        });
      });

      // 6. 將依循道路的軌跡繪製成紅色折線
      routeLine = new google.maps.Polyline({
        path: roadPath,
        geodesic: true,
        strokeColor: '#ef4444', // 紅色線條
        strokeOpacity: 0.8,
        strokeWeight: 5
      });
      routeLine.setMap(map);
    } else {
      console.error('道路路徑規劃失敗，原因: ' + status);
      // 如果導航 API 失敗（例如某些點在無路可走的深山），則自動啟動直線備用方案，避免畫面壞掉
      drawBackupStraightLine(routeStops);
    }
  });

  // 7. 自動調整地圖視野
  map.fitBounds(bounds);
}

// 備用方案：若 Directions API 異常，自動切回直線連線
function drawBackupStraightLine(routeStops) {
  const pathCoordinates = routeStops.map(stop => ({ lat: parseFloat(stop.lat), lng: parseFloat(stop.lng) }));
  routeLine = new google.maps.Polyline({
    path: pathCoordinates,
    geodesic: true,
    strokeColor: '#ffbb00', // 備用線條改為橘黃色以資區別
    strokeOpacity: 0.8,
    strokeWeight: 4
  });
  routeLine.setMap(map);
}

  </script>
</body>
</html>
