<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校車路線與時刻查詢系統</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 15px;
      background-color: #f8f9fa;
      color: #333;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }
    h2 {
      margin-top: 0;
      color: #1e3a8a;
      border-bottom: 2px solid #e5e7eb;
      padding-bottom: 10px;
      font-size: 24px;
    }
    .select-group {
      margin-bottom: 20px;
      background: #f0f4f8;
      padding: 15px;
      border-radius: 6px;
    }
    label {
      font-weight: bold;
      display: block;
      margin-bottom: 8px;
    }
    select {
      width: 100%;
      max-width: 400px;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background-color: #fff;
    }
    
    /* 電腦版左右並排 */
    .main-content {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }
    .map-container {
      flex: 7;
      min-width: 0;
    }
    .sidebar {
      flex: 3;
      background-color: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 15px;
      max-height: 450px;
      overflow-y: auto;
    }
    
    #map {
      height: 450px;
      width: 100%;
      border-radius: 6px;
      border: 1px solid #e5e7eb;
      background-color: #eaeaea;
    }
    #pano {
      height: 300px;
      width: 100%;
      border-radius: 6px;
      border: 1px solid #e5e7eb;
      display: none;
      margin-top: 20px;
    }
    .hint {
      font-size: 14px;
      color: #6b7280;
      margin-top: 5px;
      line-height: 1.4;
    }

    /* 時刻表樣式 */
    .sidebar-title {
      font-size: 18px;
      font-weight: bold;
      color: #1e3a8a;
      margin-top: 0;
      margin-bottom: 15px;
      border-bottom: 1px solid #d1d5db;
      padding-bottom: 8px;
    }
    .stop-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .stop-item {
      display: flex;
      align-items: flex-start;
      margin-bottom: 15px;
      cursor: pointer;
      padding: 8px;
      border-radius: 4px;
      transition: background-color 0.2s;
    }
    .stop-item:hover {
      background-color: #e5e7eb;
    }
    .stop-badge {
      background-color: #1e3a8a;
      color: white;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      margin-right: 12px;
      flex-shrink: 0;
    }
    .stop-info {
      display: flex;
      flex-direction: column;
    }
    .stop-name {
      font-weight: bold;
      font-size: 15px;
      color: #1f2937;
    }
    .stop-time {
      font-size: 13px;
      color: #2563eb;
      margin-top: 2px;
      font-weight: 500;
    }
    .empty-sidebar-hint {
      color: #9ca3af;
      text-align: center;
      padding: 40px 0;
      font-size: 14px;
    }

    /* 進階標記外觀 */
    .custom-marker-pin {
      background-color: #e11d48;
      color: white;
      font-weight: bold;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
      border: 2px solid #fff;
      font-size: 13px;
    }

    /* 📱 手機版 RWD 自動適應樣式 */
    @media (max-width: 768px) {
      body { padding: 5px; }
      .container { padding: 12px; border-radius: 4px; }
      h2 { font-size: 20px; }
      select { max-width: 100%; padding: 14px; }
      .main-content { flex-direction: column; gap: 15px; }
      #map { height: 320px; }
      .sidebar { max-height: 300px; }
      .stop-item { padding: 12px 8px; border-bottom: 1px solid #e5e7eb; }
      #pano { height: 250px; }
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>🚌 校車路線時刻查詢</h2>
    
    <div class="select-group">
      <label for="routeSelect">請選擇校車路線：</label>
      <select id="routeSelect" onchange="loadSelectedRoute()">
        <option value="">-- 讀取路線中 --</option>
      </select>
      <p class="hint">💡 提示：點擊地圖標記或下方站點名稱，可查看 Google 實景街景影像。</p>
    </div>
    
    <div class="main-content">
      <div class="map-container" id="mapTarget">
        <div id="map"></div>
      </div>
      
      <div class="sidebar">
        <div class="sidebar-title">⏱️ 站點與發車時刻</div>
        <div id="sidebarContent">
          <div class="empty-sidebar-hint">請先選擇上方校車路線</div>
        </div>
      </div>
    </div>
    
    <div id="pano"></div>
  </div>
<script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA6X_jnYl1SBCbEPMiiTEHOCAudU3J451M&loading=async&callback=initMap"> </script>

  <script>
    let map;
    let globalData = [];
    let markers = [];
    let routeLine = null;
    let AdvancedMarkerElementClass = null;

    // 1. 初始化 Google 地圖
    async function initMap() {
      try {
        map = new google.maps.Map(document.getElementById('map'), {
          center: { lat: 23.456, lng: 120.462 }, 
          zoom: 12,
          mapTypeControl: false,
          mapId: "SCHOOL_BUS_MAP_ID" 
        });

        // 提早加載進階標記元件
        const { AdvancedMarkerElement } = await google.maps.importLibrary("marker");
        AdvancedMarkerElementClass = AdvancedMarkerElement;

        autoFetchJson();
      } catch (e) {
        console.error("地圖載入或函式庫提取失敗:", e);
      }
    }

    // 2. 讀取 JSON 檔案（加入嚴格的安全性與格式防禦）
    async function autoFetchJson() {
      // ⚠️ 如果是在自己電腦點兩下測試，請直接改成 'bus_data.json'
      // ⚠️ 如果在 GitHub 上，請精準換成帶有 ://githubusercontent.com 開頭的純文字網址
      const JSON_URL = 'https://raw.githubusercontent.com/le094767/cmsh_bus/refs/heads/main/bus_data.json'; 
      
      try {
        const response = await fetch(JSON_URL);
        if (!response.ok) throw new Error(`HTTP 錯誤！狀態碼: ${response.status}`);
        
        // 🎯 核心防禦：檢查回傳的檔案類型。如果不是 JSON（例如抓到 GitHub 的 HTML 網頁），立刻攔截報錯！
        const contentType = response.headers.get("content-type");
        if (contentType && contentType.includes("text/html")) {
          throw new Error("抓取網址錯誤！伺服器傳回了網頁(HTML)而不是資料(JSON)。這通常是因為 GitHub 網址填錯（少填了 raw 或是打錯字）導致抓到了 404 網頁。");
        }

        const data = await response.json();
        processRouteData(data);
      } catch (error) {
        console.error('讀取 JSON 失敗：', error);
        // 將錯誤訊息直接印在選單上，避免全網頁死白
        document.getElementById('routeSelect').innerHTML = `<option value="">⚠️ 資料載入失敗：${error.message.substring(0, 45)}...</option>`;
        alert(`【校車系統錯誤提示】\n\n${error.message}\n\n請檢查程式碼內設定的 JSON_URL 是否正確。`);
      }
    }

    // 3. 解析 JSON 並填入選單
    function processRouteData(data) {
      globalData = data;
      const uniqueRoutes = [];
      const seen = new Set();
      
      globalData.forEach(row => {
        if (row.route_id && !seen.has(row.route_id)) {
          seen.add(row.route_id);
          uniqueRoutes.push({ id: row.route_id, name: row.route_name });
        }
      });

      const select = document.getElementById('routeSelect');
      if (uniqueRoutes.length === 0) {
        select.innerHTML = '<option value="">-- 無有效路線資料 --</option>';
        return;
      }

      select.innerHTML = '<option value="">-- 請選擇路線 --</option>';
      uniqueRoutes.forEach(route => {
        const opt = document.createElement('option');
        opt.value = route.id;
        opt.innerText = route.name;
        select.appendChild(opt);
      });
    }

    // 4. 強制直線連線防禦方案
    function drawBackupStraightLine(coords) {
      if (routeLine) routeLine.setMap(null); 
      
      routeLine = new google.maps.Polyline({
        path: coords,
        geodesic: true,
        strokeColor: '#2563eb', 
        strokeOpacity: 0.8,
        strokeWeight: 5
      });
      routeLine.setMap(map);
    }

    // 5. 切換路線的核心主要邏輯
    function loadSelectedRoute() {
      const selectedRouteId = document.getElementById('routeSelect').value;
      const sidebarContent = document.getElementById('sidebarContent');
      
      // 清除舊標記
      markers.forEach(m => m.map = null);
      markers = [];
      if (routeLine) {
        routeLine.setMap(null);
        routeLine = null;
      }
      document.getElementById('pano').style.display = 'none';

      if (!selectedRouteId) {
        sidebarContent.innerHTML = '<div class="empty-sidebar-hint">請先選擇上方校車路線</div>';
        return;
      }

      const routeStops = globalData
        .filter(row => row.route_id === selectedRouteId && (row.is_active === true || row.is_active === "TRUE"))
        .sort((a, b) => parseInt(a.sequence) - parseInt(b.sequence));

      if (routeStops.length === 0) {
        sidebarContent.innerHTML = '<div class="empty-sidebar-hint" style="color:#ef4444;">該路線無有效資料</div>';
        return;
      }

      const ul = document.createElement('ul');
      ul.className = 'stop-list';

      const pathCoordinates = [];
      const bounds = new google.maps.LatLngBounds();

      // 產生進階標記
      routeStops.forEach((stop) => {
        const position = { lat: parseFloat(stop.lat), lng: parseFloat(stop.lng) };
        pathCoordinates.push(position);
        bounds.extend(position);

        const markerTag = document.createElement("div");
        markerTag.className = "custom-marker-pin";
        markerTag.innerText = stop.sequence.toString();

        if (AdvancedMarkerElementClass) {
          const advancedMarker = new AdvancedMarkerElementClass({
            map: map,
            position: position,
            content: markerTag,
            title: `${stop.stop_name} (${stop.arrival_time})`
          });
          markers.push(advancedMarker);

          const infoWindow = new google.maps.InfoWindow({
            content: `<div style="padding:5px;"><strong>${stop.stop_name}</strong><br>預估到站時間：${stop.arrival_time}</div>`
          });
          advancedMarker.element.addEventListener('mouseover', () => infoWindow.open(map, advancedMarker));
advancedMarker.element.addEventListener('mouseout', () => infoWindow.close());
advancedMarker.addListener('click', () => triggerStreetView(position, false));
} else {
const fallbackMarker = new google.maps.Marker({
position: position,
map: map,
label: stop.sequence.toString()
});
markers.push(fallbackMarker);
fallbackMarker.addListener('click', () => triggerStreetView(position, false));
}
// 生成右側面板項
const li = document.createElement('li');
li.className = 'stop-item';
li.innerHTML = <div class="stop-badge">${stop.sequence}</div> <div class="stop-info"> <div class="stop-name">${stop.stop_name}</div> <div class="stop-time">⏱️ 發車時間：${stop.arrival_time}</div> </div>;
li.addEventListener('click', () => {
map.setCenter(position);
map.setZoom(16);
triggerStreetView(position, true);
});
ul.appendChild(li);
});
sidebarContent.innerHTML = '';
sidebarContent.appendChild(ul);
// 共用街景函式
function triggerStreetView(pos, shouldScrollToMap) {
const panoEl = document.getElementById('pano');
panoEl.style.display = 'block';
new google.maps.StreetViewPanorama(panoEl, {
position: pos,
pov: { heading: 165, pitch: 0 },
zoom: 1
});
if (shouldScrollToMap && window.innerWidth <= 768) {
document.getElementById('mapTarget').scrollIntoView({ behavior: 'smooth' });
} else {
panoEl.scrollIntoView({ behavior: 'smooth' });
}
}
// 6. 道路規劃與高相容性繪製 (使用高穩定的 overview_path 欄位)
try {
const directionsService = new google.maps.DirectionsService();
const origin = pathCoordinates[0]; // 精準鎖定起點
const destination = pathCoordinates[pathCoordinates.length - 1]; // 精準鎖定終點
const waypoints = [];
for (let i = 1; i < pathCoordinates.length - 1; i++) {
waypoints.push({
location: pathCoordinates[i],
stopover: true
});
}
directionsService.route({
origin: origin,
destination: destination,
waypoints: waypoints,
optimizeWaypoints: false,
travelMode: google.maps.TravelMode.DRIVING
}, function(response, status) {
if (status === google.maps.DirectionsStatus.OK && response && response.routes && response.routes.length > 0) {
const roadPath = response.routes[0].overview_path; // 抓取最穩定的整條導航線段
if (roadPath && roadPath.length > 0) {
routeLine = new google.maps.Polyline({
path: roadPath,
geodesic: true,
strokeColor: '#ef4444',
strokeOpacity: 0.8,
strokeWeight: 5
});
routeLine.setMap(map);
return;
}
}
console.warn('Google 道路路徑計算不可用，自動切換為備用直線：', status);
drawBackupStraightLine(pathCoordinates);
});
} catch (err) {
console.error('導航引擎內部解析攔截，改由直線對接：', err);
drawBackupStraightLine(pathCoordinates);
}
map.fitBounds(bounds);
}
window.initMap = initMap;

</script>

 </body>
</html>
