<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>校車路線時刻查詢系統 (手機優化版)</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f3f4f6;
      color: #333;
    }
    .container {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      background: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    
    .map-wrapper {
      position: sticky;
      top: 0;
      z-index: 100;
      width: 100%;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    }
    #map {
      height: 280px;
      width: 100%;
      background-color: #eaeaea;
    }

    .content-panel {
      padding: 16px;
      flex: 1;
      background-color: #fff;
    }
    h2 {
      margin-top: 0;
      color: #1e3a8a;
      font-size: 20px;
      margin-bottom: 12px;
    }
    
    .control-panel {
      background: #f0f4f8;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .control-group {
      margin-bottom: 12px;
    }
    .control-group:last-child {
      margin-bottom: 0;
    }
    label {
      font-weight: bold;
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #4b5563;
    }
    select {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background-color: #fff;
      -webkit-appearance: none;
    }
    
    .search-box {
      display: flex;
      gap: 8px;
    }
    input[type="text"] {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    button {
      background-color: #1e3a8a;
      color: white;
      border: none;
      padding: 0 16px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }
    .hint {
      font-size: 13px;
      color: #6b7280;
      margin-top: 4px;
      line-height: 1.4;
    }
    
    .sidebar {
      background-color: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px;
    }
    .sidebar-title {
      font-size: 16px;
      font-weight: bold;
      color: #1e3a8a;
      margin-bottom: 12px;
      border-bottom: 1px solid #e5e7eb;
      padding-bottom: 6px;
    }
    .stop-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .stop-item {
      display: flex;
      align-items: center;
      padding: 14px 8px;
      border-bottom: 1px solid #f3f4f6;
      cursor: pointer;
    }
    .stop-item:last-child {
      border-bottom: none;
    }
    .stop-badge {
      color: white;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      margin-right: 12px;
      flex-shrink: 0;
    }
    .stop-info {
      display: flex;
      flex-direction: column;
    }
    .stop-name {
      font-weight: bold;
      font-size: 15px;
      color: #1f2937;
    }
    .stop-time {
      font-size: 13px;
      color: #2563eb;
      margin-top: 2px;
    }
    .stop-end {
      font-size: 13px;
      color: #0d9488; 
      margin-top: 2px;
      font-weight: bold;
    }
    .empty-sidebar-hint {
      color: #9ca3af;
      text-align: center;
      padding: 30px 0;
      font-size: 14px;
      line-height: 1.5;
    }

    #pano {
      height: 240px;
      width: 100%;
      border-top: 1px solid #e5e7eb;
      margin-top: 16px;
      display: none;
    }

    .custom-marker-pin {
      color: white;
      font-weight: bold;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
      border: 2px solid #fff;
      font-size: 12px;
    }

    .home-marker-pin {
      background-color: #fbbf24;
      color: #1e3a8a;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
      border: 3px solid #fff;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="map-wrapper" id="mapTarget">
      <div id="map"></div>
    </div>
    
    <div class="content-panel">
      <h2>🚌 校車時刻查詢 (行動優化版)</h2>
      
      <div class="control-panel">
        <div class="control-group">
          <label for="routeSelect">請選擇校車路線：</label>
          <select id="routeSelect" onchange="loadSelectedRoute()">
            <option value="">-- 讀取路線中 --</option>
          </select>
        </div>
        
        <div class="control-group">
          <label for="addressInput">🏠 輸入您的住家地址（對照最近站點）：</label>
          <div class="search-box">
            <input type="text" id="addressInput" placeholder="輸入地址，如：嘉義縣民雄鄉..." onkeypress="if(event.keyCode==13) searchAddress()">
            <button onclick="searchAddress()">搜尋</button>
          </div>
        </div>
      </div>
      
      <p class="hint">💡 提示：點擊下方站點，地圖會自動移至該處，再往下捲動即可查看等車處的實景街景。</p>
      
      <div class="sidebar">
        <div class="sidebar-title">⏱️ 站點與發車時刻</div>
        <div id="sidebarContent">
          <div class="empty-sidebar-hint">目前為全校點位模式。<br>請選取上方路線查看單一時刻表。</div>
        </div>
      </div>
      
      <div id="pano"></div>
    </div>
  </div>

  <script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA6X_jnYl1SBCbEPMiiTEHOCAudU3J451M&loading=async&callback=initMap"></script>
  <script>
    let map;
    let globalData = [];
    let markers = [];
    let homeMarker = null;
    let AdvancedMarkerElementClass = null;
    let routeColorMap = {};

    const COLOR_PALETTE = [
      '#e11d48', '#2563eb', '#16a34a', '#ea580c', 
      '#9333ea', '#0d9488', '#db2777', '#4b5563'
    ];

    async function initMap() {
      try {
        map = new google.maps.Map(document.getElementById('map'), {
          center: { lat: 23.456, lng: 120.462 }, 
          zoom: 12,
          mapTypeControl: false,
          streetViewControl: false,
          zoomControl: true,
          mapId: "SCHOOL_BUS_MAP_ID" 
        });

        const { AdvancedMarkerElement } = await google.maps.importLibrary("marker");
        AdvancedMarkerElementClass = AdvancedMarkerElement;

        autoFetchJson();
      } catch (e) {
        console.error("地圖載入失敗:", e);
      }
    }

    async function autoFetchJson() {
      const JSON_URL = 'https://raw.githubusercontent.com/le094767/cmsh_bus/refs/heads/main/bus_data.json';
      try {
        const response = await fetch(JSON_URL);
        if (!response.ok) throw new Error('檔案讀取失敗');
        const data = await response.json();
        processRouteData(data);
      } catch (error) {
        console.error('讀取 JSON 失敗：', error);
        document.getElementById('routeSelect').innerHTML = '<option value="">-- 無法載入路線資料 --</option>';
      }
    }

    function processRouteData(data) {
      globalData = data;
      const uniqueRoutes = [];
      const seen = new Set();
      
      let colorIndex = 0;
      globalData.forEach(row => {
        if (row.route_id && !seen.has(row.route_id)) {
          seen.add(row.route_id);
          uniqueRoutes.push({ id: row.route_id, name: row.route_name });
          routeColorMap[row.route_id] = COLOR_PALETTE[colorIndex % COLOR_PALETTE.length];
          colorIndex++;
        }
      });

      const select = document.getElementById('routeSelect');
      if (uniqueRoutes.length === 0) {
        select.innerHTML = '<option value="">-- 無有效路線資料 --</option>';
        return;
      }

      select.innerHTML = '<option value="">-- 查看全校所有站點 --</option>';
      uniqueRoutes.forEach(route => {
        const opt = document.createElement('option');
        opt.value = route.id;
        opt.innerText = route.name;
        select.appendChild(opt);
      });

      renderAllStopsToMap();
    }

    function renderAllStopsToMap() {
      markers.forEach(m => m.map = null);
      markers = [];
      document.getElementById('pano').style.display = 'none';
      
      const hintText = '💡 目前為全校點位檢視模式。';
      const hintSub = '請由上方選單切換特定路線來查看發車時刻表。';
      document.getElementById('sidebarContent').innerHTML = 
        '<div class="empty-sidebar-hint">' + hintText + '<br>' + hintSub + '</div>';

      if (homeMarker) homeMarker.map = map;

      const bounds = new google.maps.LatLngBounds();
      const activeStops = globalData.filter(row => row.is_active === true || row.is_active === "TRUE");

      if (activeStops.length === 0) return;

      activeStops.forEach((stop) => {
        const position = { lat: parseFloat(stop.lat), lng: parseFloat(stop.lng) };
        bounds.extend(position);

        const routeColor = routeColorMap[stop.route_id] || '#ef4444';

        const markerTag = document.createElement("div");
        markerTag.className = "custom-marker-pin";
        markerTag.style.backgroundColor = routeColor;
        markerTag.textContent = stop.sequence.toString();

        if (AdvancedMarkerElementClass) {
          const advancedMarker = new AdvancedMarkerElementClass({
            map: map,
            position: position,
            content: markerTag,
            title: stop.stop_name + ' (' + stop.arrival_time + ')'
          });
          markers.push(advancedMarker);

          const infoWindow = new google.maps.InfoWindow({
            content: '<div style="padding:5px;font-size:14px;"><strong>[' + stop.route_name + '] ' + 
                     stop.stop_name + '</strong><br>時間：' + stop.arrival_time + '</div>'
          });
          advancedMarker.addEventListener('gmp-click', () => {
            infoWindow.open(map, advancedMarker);
            triggerStreetView(position, false);
          });
        }
      });
      if (homeMarker) bounds.extend(homeMarker.position);
      map.fitBounds(bounds);
    }

    function loadSelectedRoute() {
      const selectedRouteId = document.getElementById('routeSelect').value;
      const sidebarContent = document.getElementById('sidebarContent');
      if (!selectedRouteId) {
        renderAllStopsToMap();
        return;
      }
      markers.forEach(m => m.map = null);
      markers = [];
      document.getElementById('pano').style.display = 'none';
      if (homeMarker) homeMarker.map = map;
      
      const routeStops = globalData
        .filter(row => row.route_id === selectedRouteId && (row.is_active === true || row.is_active === "TRUE"))
        .sort((a, b) => parseInt(a.sequence) - parseInt(b.sequence));
      
      if (routeStops.length === 0) {
        sidebarContent.innerHTML = '該路線無有效資料';
        return;
      }
      
      const ul = document.createElement('ul');
      ul.className = 'stop-list';
      const bounds = new google.maps.LatLngBounds();
      const currentRouteColor = routeColorMap[selectedRouteId] || '#1e3a8a';
      
      routeStops.forEach((stop, index) => {
        const position = { lat: parseFloat(stop.lat), lng: parseFloat(stop.lng) };
        bounds.extend(position);
        
        const markerTag = document.createElement("div");
        markerTag.className = "custom-marker-pin";
        markerTag.style.backgroundColor = currentRouteColor;
        markerTag.textContent = stop.sequence.toString();
        
        if (AdvancedMarkerElementClass) {
          const advancedMarker = new AdvancedMarkerElementClass({
            map: map,
            position: position,
            content: markerTag,
            title: stop.stop_name + ' (' + stop.arrival_time + ')'
          });
          markers.push(advancedMarker);
          
          const infoWindow = new google.maps.InfoWindow({
            content: '<div style="padding:5px;font-size:14px;"><strong>' + stop.stop_name + 
                     '</strong><br>預估到站時間：' + stop.arrival_time + '</div>'
          });
          advancedMarker.addEventListener('gmp-click', () => {
            infoWindow.open(map, advancedMarker);
            triggerStreetView(position, false);
          });
        }
        
        const isLastStop = (index === routeStops.length - 1);
        const li = document.createElement('li');
        li.className = 'stop-item';
        
        let timeDiv = '<div class="stop-time">⏱️ 發車時間：' + stop.arrival_time + '</div>';
        if (isLastStop) {
          timeDiv = '<div class="stop-end">🏁 抵達時間：' + stop.arrival_time + '</div>';
        }
        
        li.innerHTML = '<div class="stop-badge" style="background-color: ' + currentRouteColor + ';">' + 
                       stop.sequence + '</div> <div class="stop-info"> <div class="stop-name">' + 
                       stop.stop_name + '</div> ' + timeDiv + ' </div>';
        
        li.addEventListener('click', () => {
          map.setCenter(position);
          map.setZoom(16);
          triggerStreetView(position, true);
        });
        ul.appendChild(li);
      });
      
      sidebarContent.innerHTML = '';
      sidebarContent.appendChild(ul);
      if (homeMarker) bounds.extend(homeMarker.position);
      map.fitBounds(bounds);
    }

    function searchAddress() {
      const address = document.getElementById('addressInput').value.trim();
      if (!address) {
        alert('請先輸入地址再進行搜尋！');
        return;
      }
      const geocoder = new google.maps.Geocoder();
      geocoder.geocode({ address: address }, function(results, status) {
        if (status === 'OK' && results && results.length > 0 && results[0].geometry) {
          const homePosition = results[0].geometry.location;
          if (homeMarker) homeMarker.map = null;
          const homeTag = document.createElement("div");
          homeTag.className = "home-marker-pin";
          homeTag.textContent = "⭐";
          if (AdvancedMarkerElementClass) {
            homeMarker = new AdvancedMarkerElementClass({
              map: map,
              position: homePosition,
              content: homeTag,
              title: '您的住家位置：' + address
            });
            const homeInfoWindow = new google.maps.InfoWindow({
              content: '<div style="padding:5px;font-weight:bold;color:#1e3a8a;">🏠 您的住家位置</div>'
            });
            homeInfoWindow.open(map, homeMarker);
          }
          map.setCenter(homePosition);
          map.setZoom(15);
          document.getElementById('mapTarget').scrollIntoView({ behavior: 'smooth' });
        } else {
          alert('找不到該地址，請確認地址輸入是否正確（建議加上縣市名稱，如：嘉義縣民雄鄉...）。');
        }
      });
    }

    function triggerStreetView(pos, shouldScrollToMap) {
      const panoEl = document.getElementById('pano');
      panoEl.style.display = 'block';
      new google.maps.StreetViewPanorama(panoEl, {
        position: pos,
        pov: { heading: 165, pitch: 0 },
        zoom: 1,
        addressControl: false,
        fullscreenControl: false
      });
      if (shouldScrollToMap) {
        document.getElementById('mapTarget').scrollIntoView({ behavior: 'smooth' });
      } else {
        panoEl.scrollIntoView({ behavior: 'smooth' });
      }
    }

    window.initMap = initMap;
  </script>

 </body>
</html>
