<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>校車路線時刻查詢系統 (手機優化版)</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f3f4f6;
      color: #333;
    }
    .container {
      width: 100%;
      max-width: 600px; /* 限制最大寬度，使其在手機及直向平板上完美居中 */
      margin: 0 auto;
      background: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    
    /* 📱 手機版地圖區塊：置頂、高度適中，留給下方足夠的操作空間 */
    .map-wrapper {
      position: sticky;
      top: 0;
      z-index: 100;
      width: 100%;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    }
    #map {
      height: 280px; /* 手機黃金比例高度 */
      width: 100%;
      background-color: #eaeaea;
    }

    /* 下方操作面板區塊 */
    .content-panel {
      padding: 16px;
      flex: 1;
      background-color: #fff;
    }
    h2 {
      margin-top: 0;
      color: #1e3a8a;
      font-size: 20px;
      margin-bottom: 12px;
    }
    
    /* 手機控制面板：上下垂直堆疊，加大觸控間距 */
    .control-panel {
      background: #f0f4f8;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .control-group {
      margin-bottom: 12px;
    }
    .control-group:last-child {
      margin-bottom: 0;
    }
    label {
      font-weight: bold;
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #4b5563;
    }
    select {
      width: 100%;
      padding: 12px; /* 加大觸控高度 */
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background-color: #fff;
      -webkit-appearance: none; /* 清除手機內建選單陰影 */
    }
    
    /* 搜尋框排版 */
    .search-box {
      display: flex;
      gap: 8px;
    }
    input[type="text"] {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    button {
      background-color: #1e3a8a;
      color: white;
      border: none;
      padding: 0 16px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }
    .hint {
      font-size: 13px;
      color: #6b7280;
      margin-top: 4px;
      line-height: 1.4;
    }
    
    /* 手機版時刻表面板 */
    .sidebar {
      background-color: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px;
    }
    .sidebar-title {
      font-size: 16px;
      font-weight: bold;
      color: #1e3a8a;
      margin-bottom: 12px;
      border-bottom: 1px solid #e5e7eb;
      padding-bottom: 6px;
    }
    .stop-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .stop-item {
      display: flex;
      align-items: center;
      padding: 14px 8px; /* 大幅度加大上下行距，防止手指誤觸相鄰站點 */
      border-bottom: 1px solid #f3f4f6;
      cursor: pointer;
    }
    .stop-item:last-child {
      border-bottom: none;
    }
    .stop-badge {
      color: white;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      margin-right: 12px;
      flex-shrink: 0;
    }
    .stop-info {
      display: flex;
      flex-direction: column;
    }
    .stop-name {
      font-weight: bold;
      font-size: 15px;
      color: #1f2937;
    }
    .stop-time {
      font-size: 13px;
      color: #2563eb;
      margin-top: 2px;
    }
    .stop-end {
      font-size: 13px;
      color: #0d9488; 
      margin-top: 2px;
      font-weight: bold;
    }
    .empty-sidebar-hint {
      color: #9ca3af;
      text-align: center;
      padding: 30px 0;
      font-size: 14px;
      line-height: 1.5;
    }

    /* 街景顯示區域 */
    #pano {
      height: 240px;
      width: 100%;
      border-top: 1px solid #e5e7eb;
      margin-top: 16px;
      display: none;
    }

    /* 進階標記基礎 CSS */
    .custom-marker-pin {
      color: white;
      font-weight: bold;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
      border: 2px solid #fff;
      font-size: 12px;
    }

    /* 🏠 住家黃金星星圖標 */
    .home-marker-pin {
      background-color: #fbbf24;
      color: #1e3a8a;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
      border: 3px solid #fff;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- 置頂地圖區塊 -->
    <div class="map-wrapper" id="mapTarget">
      <div id="map"></div>
    </div>
    
    <!-- 下方內容操作面板 -->
    <div class="content-panel">
      <h2>🚌 校車時刻查詢 (行動優化版)</h2>
      
      <div class="control-panel">
        <div class="control-group">
          <label for="routeSelect">請選擇校車路線：</label>
          <select id="routeSelect" onchange="loadSelectedRoute()">
            <option value="">-- 讀取路線中 --</option>
          </select>
        </div>
        
        <div class="control-group">
          <label for="addressInput">🏠 輸入您的住家地址（對照最近站點）：</label>
          <div class="search-box">
            <input type="text" id="addressInput" placeholder="輸入地址，如：嘉義縣民雄鄉..." onkeypress="if(event.keyCode==13) searchAddress()">
            <button onclick="searchAddress()">搜尋</button>
          </div>
        </div>
      </div>
      
      <p class="hint">💡 提示：點擊下方站點，地圖會自動移至該處，再往下捲動即可查看等車處的實景街景。</p>
      
      <!-- 時刻表 -->
      <div class="sidebar">
        <div class="sidebar-title">⏱️ 站點與發車時刻</div>
        <div id="sidebarContent">
          <div class="empty-sidebar-hint">目前為全校點位模式。<br>請選取上方路線查看單一時刻表。</div>
        </div>
      </div>
      
      <!-- 街景容器 -->
      <div id="pano"></div>
    </div>
  </div>
<script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA6X_jnYl1SBCbEPMiiTEHOCAudU3J451M&loading=async&callback=initMap"> </script>
  <script>
  <script>
    let map;
    let globalData = [];
    let markers = [];
    let homeMarker = null;
    let AdvancedMarkerElementClass = null;
    let routeColorMap = {};

    const COLOR_PALETTE = [
      '#e11d48', '#2563eb', '#16a34a', '#ea580c', 
      '#9333ea', '#0d9488', '#db2777', '#4b5563'
    ];

    // 1. 初始化 Google 地圖
    async function initMap() {
      try {
        map = new google.maps.Map(document.getElementById('map'), {
          center: { lat: 23.456, lng: 120.462 }, 
          zoom: 12,
          mapTypeControl: false,
          streetViewControl: false, // 關聯內建街景小人，我們用下方自訂區塊渲染
          zoomControl: true,       // 允許手機端縮放
          mapId: "SCHOOL_BUS_MAP_ID" 
        });

        const { AdvancedMarkerElement } = await google.maps.importLibrary("marker");
        AdvancedMarkerElementClass = AdvancedMarkerElement;

        autoFetchJson();
      } catch (e) {
        console.error("地圖載入或函式庫提取失敗:", e);
      }
    }

    // 2. 自動讀取 JSON 檔案
    async function autoFetchJson() {
      const JSON_URL = 'https://raw.githubusercontent.com/le094767/cmsh_bus/refs/heads/main/bus_data.json';
      try {
        const response = await fetch(JSON_URL);
        if (!response.ok) throw new Error('檔案讀取失敗');
        const data = await response.json();
        processRouteData(data);
      } catch (error) {
        console.error('讀取 JSON 失敗：', error);
        document.getElementById('routeSelect').innerHTML = '<option value="">-- 無法載入路線資料 --</option>';
      }
    }

    // 3. 解析 JSON、動態分配色彩
    function processRouteData(data) {
      globalData = data;
      const uniqueRoutes = [];
      const seen = new Set();
      
      let colorIndex = 0;
      globalData.forEach(row => {
        if (row.route_id && !seen.has(row.route_id)) {
          seen.add(row.route_id);
          uniqueRoutes.push({ id: row.route_id, name: row.route_name });
          routeColorMap[row.route_id] = COLOR_PALETTE[colorIndex % COLOR_PALETTE.length];
          colorIndex++;
        }
      });

      const select = document.getElementById('routeSelect');
      if (uniqueRoutes.length === 0) {
        select.innerHTML = '<option value="">-- 無有效路線資料 --</option>';
        return;
      }

      select.innerHTML = '<option value="">-- 查看全校所有站點 --</option>';
      uniqueRoutes.forEach(route => {
        const opt = document.createElement('option');
        opt.value = route.id;
        opt.innerText = route.name;
        select.appendChild(opt);
      });

      renderAllStopsToMap();
    }

    // 4. 全校總覽打點
    function renderAllStopsToMap() {
      markers.forEach(m => m.map = null);
      markers = [];
      document.getElementById('pano').style.display = 'none';
      document.getElementById('sidebarContent').innerHTML = '<div class="empty-sidebar-hint">💡 目前為全校點位檢視模式。<br>請由上方選單切換特定路線來查看發車时刻表。</div>';

      if (homeMarker) homeMarker.map = map;

      const bounds = new google.maps.LatLngBounds();
      const activeStops = globalData.filter(row => row.is_active === true || row.is_active === "TRUE");

      if (activeStops.length === 0) return;

      activeStops.forEach((stop) => {
        const position = { lat: parseFloat(stop.lat), lng: parseFloat(stop.lng) };
        bounds.extend(position);

        const routeColor = routeColorMap[stop.route_id] || '#ef4444';

        const markerTag = document.createElement("div");
        markerTag.className = "custom-marker-pin";
        markerTag.style.backgroundColor = routeColor;
        markerTag.innerText = stop.sequence.toString();

        if (AdvancedMarkerElementClass) {
          const advancedMarker = new AdvancedMarkerElementClass({
            map: map,
            position: position,
            content: markerTag,
            title: `${stop.stop_name} (${stop.arrival_time})`
          });
          markers.push(advancedMarker);

          const infoWindow = new google.maps.InfoWindow({
content: <div style="padding:5px;font-size:14px;"><strong>[${stop.route_name}] ${stop.stop_name}</strong><br>時間：${stop.arrival_time}</div>
});
advancedMarker.addListener('click', () => {
infoWindow.open(map, advancedMarker);
triggerStreetView(position, false); // 點擊地圖時，街景在最下方載入，不強制奪取焦點
});
}
});
if (homeMarker) bounds.extend(homeMarker.position);
map.fitBounds(bounds);
}
// 5. 單一路線單獨檢視與時刻表渲染
function loadSelectedRoute() {
const selectedRouteId = document.getElementById('routeSelect').value;
const sidebarContent = document.getElementById('sidebarContent');
if (!selectedRouteId) {
renderAllStopsToMap();
return;
}
markers.forEach(m => m.map = null);
markers = [];
document.getElementById('pano').style.display = 'none';
if (homeMarker) homeMarker.map = map;
const routeStops = globalData
.filter(row => row.route_id === selectedRouteId && (row.is_active === true || row.is_active === "TRUE"))
.sort((a, b) => parseInt(a.sequence) - parseInt(b.sequence));
if (routeStops.length === 0) {
sidebarContent.innerHTML = '該路線無有效資料';
return;
}
const ul = document.createElement('ul');
ul.className = 'stop-list';
const bounds = new google.maps.LatLngBounds();
const currentRouteColor = routeColorMap[selectedRouteId] || '#1e3a8a';
routeStops.forEach((stop, index) => {
const position = { lat: parseFloat(stop.lat), lng: parseFloat(stop.lng) };
bounds.extend(position);
const markerTag = document.createElement("div");
markerTag.className = "custom-marker-pin";
markerTag.style.backgroundColor = currentRouteColor;
markerTag.innerText = stop.sequence.toString();
if (AdvancedMarkerElementClass) {
const advancedMarker = new AdvancedMarkerElementClass({
map: map,
position: position,
content: markerTag,
title: ${stop.stop_name} (${stop.arrival_time})
});
markers.push(advancedMarker);
const infoWindow = new google.maps.InfoWindow({
content: <div style="padding:5px;font-size:14px;"><strong>${stop.stop_name}</strong><br>預估到站時間：${stop.arrival_time}</div>
});
advancedMarker.addListener('click', () => {
infoWindow.open(map, advancedMarker);
triggerStreetView(position, false);
});
}
const isLastStop = (index === routeStops.length - 1);
let timeInfoHtml = '';
if (isLastStop) {
timeInfoHtml = <div class="stop-end">🏁 抵達時間：${stop.arrival_time}</div>;
} else {
timeInfoHtml = <div class="stop-time">⏱️ 發車時間：${stop.arrival_time}</div>;
}
const li = document.createElement('li');
li.className = 'stop-item';
li.innerHTML = <div class="stop-badge" style="background-color: ${currentRouteColor};">${stop.sequence}</div> <div class="stop-info"> <div class="stop-name">${stop.stop_name}</div> ${timeInfoHtml} </div>;
// 💡 手機核心互動：家長點選下方列表時，地圖飄移過去，並自動將網頁焦點滑動回頂部地圖，方便一邊看時間一邊看地圖變化
li.addEventListener('click', () => {
map.setCenter(position);
map.setZoom(16);
triggerStreetView(position, true); // 傳入 true 指令，要求滾動回地圖
});
ul.appendChild(li);
});
sidebarContent.innerHTML = '';
sidebarContent.appendChild(ul);
if (homeMarker) bounds.extend(homeMarker.position);
map.fitBounds(bounds);
}
// 6. 地址搜尋功能
function searchAddress() {
const address = document.getElementById('addressInput').value.trim();
if (!address) {
alert('請先輸入地址再進行搜尋！');
return;
}
const geocoder = new google.maps.Geocoder();
geocoder.geocode({ address: address }, function(results, status) {
if (status === 'OK' && results) {
const homePosition = results.geometry.location;
if (homeMarker) homeMarker.map = null;
const homeTag = document.createElement("div");
homeTag.className = "home-marker-pin";
homeTag.innerText = "⭐";
if (AdvancedMarkerElementClass) {
homeMarker = new AdvancedMarkerElementClass({
map: map,
position: homePosition,
content: homeTag,
title: 您的住家位置：${address}
});
const homeInfoWindow = new google.maps.InfoWindow({
content: <div style="padding:5px;font-weight:bold;color:#1e3a8a;">🏠 您的住家位置</div>
});
homeInfoWindow.open(map, homeMarker);
}
map.setCenter(homePosition);
map.setZoom(15);
// 💡 手機搜尋優化：地址搜尋成功後，網頁平滑滾動回頂部置頂的地圖，讓家長立刻看到打點成果
document.getElementById('mapTarget').scrollIntoView({ behavior: 'smooth' });
} else {
alert('找不到該地址，請確認地址輸入是否正確（建議加上縣市名稱，如：嘉義縣民雄鄉...）。');
}
});
}
// 💡 手機智慧型滾動對接函式
function triggerStreetView(pos, shouldScrollToMap) {
const panoEl = document.getElementById('pano');
panoEl.style.display = 'block';
new google.maps.StreetViewPanorama(panoEl, {
position: pos,
pov: { heading: 165, pitch: 0 },
zoom: 1,
addressControl: false, // 隱藏手機上冗長的路名標籤，挪出更多實景空間
fullscreenControl: false
});
if (shouldScrollToMap) {
// 如果是點擊下方列表：畫面平滑滑回最頂端的地圖，看標記點
document.getElementById('mapTarget').scrollIntoView({ behavior: 'smooth' });
} else {
// 如果是點擊地圖標記：畫面平滑向下滾動，展示最底部的街景影像
panoEl.scrollIntoView({ behavior: 'smooth' });
}
}
window.initMap = initMap;
content: <div style="padding:5px;font-size:14px;"><strong>[${stop.route_name}] ${stop.stop_name}</strong><br>時間：${stop.arrival_time}</div>
});
advancedMarker.addListener('click', () => {
infoWindow.open(map, advancedMarker);
triggerStreetView(position, false); // 點擊地圖時，街景在最下方載入，不強制奪取焦點
});
}
});
if (homeMarker) bounds.extend(homeMarker.position);
map.fitBounds(bounds);
}

// 如果是點擊地圖標記：畫面平滑向下滾動，展示最底部的街景影像
panoEl.scrollIntoView({ behavior: 'smooth' });
}
}
window.initMap = initMap;
</script>
